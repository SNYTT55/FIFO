<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <title>🗂️FILE</title>
    <style>
        /* --- 1. 核心系統規範與重置 --- */
        :root { 
            --sys-bg: #ffffff; 
            --sys-font: "Courier New", monospace; 
            --sys-accent: #00ff00;
            --sys-border: #000000;
            --text-grey: #aaaaaa;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--sys-bg); 
            margin: 0; 
            padding-bottom: 90px; 
            color: #000; 
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        /* 強調字體類別 */
       .mono { 
            /* 只有數字、編號、或是標籤才用等寬字體 */
            font-family: "SF Mono", "Roboto Mono", Menlo, monospace; 
            font-weight: 700;
        }

        /* --- 2. 頁面佈局組件 --- */
        .page { 
            display: none; 
            padding: 25px 20px; 
            max-width: 600px; 
            margin: auto; 
        }

        /* 確保 active 狀態具有最高優先權 */
        .page.active { display: block !important; }

        /* 統一標題樣式 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid #000;
            margin-bottom: 30px;
            padding-bottom: 10px;
            height: 50px; 
        }

        .page-header h2 { 
            margin: 0; 
            font-size: 24px; 
            font-family: var(--sys-font); /* 確保標題也是工業字體 */
            font-weight: 900;
        }

        /* 1. 全域阻斷 iOS 對 Select 文字的強制著色 */
        select {
            color: #000000 !important;
            -webkit-text-fill-color: #000000 !important; /* 關鍵：強制填滿黑色 */
            opacity: 1; /* 防止 iOS 讓 disabled 狀態變灰 */
        }

        /* 2. 針對搜尋頁推薦區的選單強化 */
        #page-search select {
            color: #000000 !important;
            -webkit-appearance: none; /* 移除 iOS 預設樣式 */
            border-radius: 0;
            background-color: #fff;
        }

        /* 3. 確保預設選項（Placeholder）也是黑色的 */
        select option {
            color: #000000;
        }

        /* --- 3. 全域工業風輸入框 (給 SEARCH/SYSTEM 頁面使用) --- */
        /* 這裡維持原本的有框設計，確保外層頁面不跑樣 */
        input, select, textarea { 
            width: 100%; 
            border: 2px solid var(--sys-border); 
            padding: 10px 8px; 
            font-size: 14px; 
            background-color: #ffffff; 
            height: 44px; 
            font-family: var(--sys-font); 
            font-weight: 900;
            border-radius: 0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        /* --- 4. 底部導覽列 NAVIGATION --- */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            background: #000; 
            height: 65px; 
            z-index: 999; 
        }

        .nav-btn { 
            flex: 1; 
            color: #666; /* 這裡移除 !important，靠選取器優先級 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            cursor: pointer; 
            border: none; 
            background: none; 
            font-family: 'Impact', sans-serif; 
            letter-spacing: 1px; 
        }

        .nav-btn.active { 
            color: #fff; 
            border-top: 4px solid var(--sys-accent); 
        }

        .active-cat-row {
            background: #000 !important;
            color: #fff !important;
        }
        .active-cat-row span { color: #fff !important; }
        .active-cat-row .del-btn { color: #666; }

        .dict-row {
            cursor: pointer; /* 讓大類看起來可以點擊 */
        }
        /* --- 5. 工業風容器 SHELF_CONTAINER --- */
        .shelf-container { 
            border: 2px solid var(--sys-border); 
            margin-bottom: 25px; 
            position: relative; 
            background-color: #ffffff;
            background-image: radial-gradient(#e0e0e0 0.5px, transparent 0.5px); /* 微小點陣，增加質感 */
            background-size: 10px 10px;
            box-shadow: 6px 6px 0px #e0e0e0; /* 統一使用輕工業淺灰投影 */
            padding: 20px 18px 12px 18px; 
        }

        /* 黑色膠帶感標籤 */
        .shelf-label { 
            position: absolute; 
            top: -12px; 
            left: 12px; 
            background: #000; 
            color: #fff !important; 
            -webkit-text-fill-color: #ffffff !important;
            font-family: 'Impact', sans-serif; 
            font-size: 14px; 
            padding: 2px 12px; 
            letter-spacing: 1px;
            z-index: 10;
        }
        

        /* 清單項目列 */
        /* 1. 確保每一行容器都是垂直置中且不換行 */
        .item-line {
            position: relative;
            display: flex;
            align-items: center; /* 垂直居中 */
            gap: 12px;           /* 按鈕與文字間的固定間距 */
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            width: 100%;
            overflow: hidden;    /* 防止內容溢出 */
        }

        /* 2. 針對品名文字的強化：強制單行 + 省略號 */
        .item-name-wrap {
            flex: 1;             /* 佔滿剩餘空間 */
            min-width: 0;        /* 關鍵：允許 Flex 項目縮小，否則省略號失效 */
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;      /* 強制不換行 */
            overflow: hidden;         /* 隱藏超出部分 */
            text-overflow: ellipsis;  /* 超出時顯示 ... */
            color: #000;
        }

        /* 3. 次要資訊（如數量或效期） */
        .product-meta {
            font-size: 10px;
            color: #aaa;
            font-family: var(--sys-font);
        }

        .item-line:last-child { border-bottom: none; } /* 最後一項移除底線 */

        /* --- 6. 按鈕系統 BUTTON_SYSTEM --- */
        /* 基礎小按鈕 */
        .btn-sm { 
            padding: 6px 12px; 
            font-size: 11px; 
            border: 1px solid var(--sys-border); 
            background: #fff; 
            cursor: pointer; 
            font-family: var(--sys-font); 
            font-weight: 900;
            transition: all 0.1s;
        }

        .btn-sm:active {
            background: #000 !important;
            color: #fff !important;
        }

        .btn-off-action {
            background: transparent !important;
            color: #ff0000 !important;
            border: none;
            padding: 4px 14px;
            font-size: 10px;
            font-family: var(--sys-font);
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 0; /* 確保直角，符合工業感 */
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }



        .btn-on-action {
            background:transparent !important; /* 背景變透明 */ 
            color: #000 !important;
            border: none;
            padding: 4px 8px;
            font-size: 20px;
            font-family: var(--sys-font);
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 0; /* 確保直角，符合工業感 */
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }




        .btn-text-link {
            background:transparent !important; /* 背景變透明 */ 
            color: #0208c4 !important;
            border: none;
            padding: 4px 8px;
            font-size: 20px;
            font-family: var(--sys-font);
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 0; /* 確保直角，符合工業感 */
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center ;
            -webkit-appearance: none ;
        }


        /* 危險/清除按鈕 (帶有脈衝動畫) */
        .btn-danger { 
            background: #ff0000 ; 
            color: #fff; 
            border: 2px solid var(--sys-border);
            font-family: var(--sys-font); 
            font-weight: 900; 
            cursor: pointer;
            box-shadow: 2px 2px 0px #000; 
            padding: 4px 12px;
        }

        .btn-danger:active { transform: translate(1px, 1px); box-shadow: none; }

        /* 系統頁專用的鏈接感按鈕 */
        .btn-system-action {
            flex: 1;
            background: transparent;
            border: 1px solid #000;
            padding: 12px;
            font-family: var(--sys-font);
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1px;
            color: #000;
            text-align: center;
            cursor: pointer;
        }


        /* --- 7. 特殊顯示區塊 --- */
        #archive-list {
            background: #000; 
            color: var(--sys-accent); 
            padding: 18px; 
            border: 2px solid #000; 
            font-size: 11px; 
            line-height: 1.8;
            min-height: 100px;
        }
        
  /* --- 8. 彈出視窗核心 (MUJI STYLE) --- */
        #entry-overlay {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 92%; 
            max-height: 85vh;
            z-index: 2000; 
            padding: 30px; 
            background: #F8F8F5; /* 輕盈米色 */
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); /* 懸浮感大陰影 */
        }

        /* 視窗內的排版 */
        #entry-overlay .form-row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        #entry-overlay .form-group { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 0;
        }

        #entry-overlay label { 
            font-size: 9px; 
            font-weight: 900; 
            color: #999; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* --- 9. 視窗內專屬：極簡底線輸入框 --- */
        #entry-overlay input, 
        #entry-overlay select {
            width: 100%;
            border: none !important; 
            border-bottom: 1px solid #e0e0e0 !important; 
            padding: 12px 0px !important; 
            font-size: 16px; 
            font-family: var(--sys-font);
            font-weight: 500; 
            color: #333 !important;
            background-color: transparent !important; 
            border-radius: 0;
            box-shadow: none !important;
            transition: all 0.3s ease;
            -webkit-text-fill-color: #000000 !important;
        }

        #entry-overlay input:focus, 
        #entry-overlay select:focus {
            border-bottom: 1px solid #000 !important;
            padding-left: 5px !important;
        }
        /* 修改標頭的 CLOSE 按鈕 */
        #entry-overlay div[onclick="closeEntry()"] {
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }


        #entry-overlay div[onclick="closeEntry()"]:active {   
            background: transparent !important; /* 背景變透明 */
            color: #ff0000 !important;   
            transform: scale(0.9);
        }
        
        /* --- 10. 條碼風格儲存按鈕 (THE PROTOCOL) --- */
        .btn-save-protocol {
            all: unset;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 75%; 
            height: 75px; 
            margin: 40px auto 10px auto; 
            background: repeating-linear-gradient(
                90deg, #00000038, #000 1px, transparent 1px, transparent 6px,
                #4444442c 6px, #444444bd 7px, transparent 7px, transparent 10px
            );
            position: relative;
            transition: all 0.2s ease;
        }

        .btn-save-protocol span {
            background: #000000af;
            color:#fff !important;   
            padding: 12px 28px;
            font-family: var(--sys-font);
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 4px;
            color: #000;
            border: 2px solid #000;
            z-index: 2;
            white-space: nowrap;
        }


        /* 確保辭典清單有固定高度且邊框紮實 */
        .dict-list-box {
            height: 150px; /* 固定高度，避免長度不同 */
            background: #fff;
            border: 1px solid #000;
            margin-bottom: 5px;
            overflow-y: auto;
            width: 100%; /* 強制填滿父層 */
        }

        /* 讓輸入框容器寬度與列表一致 */
        .dict-input-wrap {
            display: flex;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
        }

        .dict-input-wrap input {
            flex: 1;
            min-width: 0; /* 防止 input 撐開容器 */
            padding: 6px;
            border: none !important;
            font-size: 12px;
        }

        .dict-input-wrap button {
            background: #000;
            color: #fff;
            border: none;
            padding: 0 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 修正條目文字溢出問題 */
        .dict-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .dict-row span {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .del-btn, .dict-row b {
            cursor: pointer;
            font-family: 'Inter', monospace;
            font-size: 9px;
            color: #ccc;
            letter-spacing: 1px;
            padding: 4px;
            transition: color 0.2s;
        }



        /* --- 11. 手機端響應式微調 (RWD) --- */
        @media (max-width: 480px) {
            #entry-overlay .form-row { 
                flex-wrap: nowrap !important; /* 強制不換行 */
            }
            #entry-overlay label {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }

        .btn-drop-protocol {
            cursor: pointer;
            text-align: center;
            font-family: var(--sys-font);
            font-size: 9px;         /* 縮小字體 */
            font-weight: 400;       /* 變細 */
            color: #ff0000;         /* 平常是極淡的灰色 */
            border: none;           /* 移除邊框 */
            background: transparent;
            padding: 10px;
            margin-top: 30px;       /* 增加間距，推到最底部 */
            transition: all 0.3s ease;
            letter-spacing: 3px;
            text-decoration: underline; /* 增加底線，看起來像個小連結 */
        }


    </style>
</head>
<body>

<div id="page-search" class="page active">
    <div class="page-header">
        <h2 class="mono">01_SEARCH</h2>
    </div>
    
    <div class="shelf-container">
        <div class="shelf-label">DATABASE_QUERY</div>
        <div style="margin-top: 10px;">
            <input type="text" id="check-input" placeholder="INPUT_KEYWORDS..." oninput="doCheck()">
            <div id="check-result" class="mono" style="font-size: 12px; margin-top: 10px; min-height: 18px;"></div>
        </div>
    </div>

    <div class="shelf-container">
    <div class="shelf-label">AUTO_RECOMMEND</div>
    <div style="margin-top: 10px;">
        <div class="form-row" style="margin-bottom: 15px; display: flex; gap: 10px;">
            <select id="pick-cat" onchange="updatePickSub()" style="flex: 1;"></select>
            <select id="pick-sub" onchange="getRecommended()" disabled style="flex: 1;"><option value="">┈473</option></select>
        </div>
        <div id="recommend-area"></div>
    </div>
</div>
</div>

<div id="page-vault" class="page">
    <div class="page-header">
        <h2 class="mono">02_VAULT</h2>
        <button class="btn-sm mono" style="background:#000; color:#fff;" onclick="openEntry()">[+] ADD_ITEM</button>
    </div>
    <div id="vault-shelves-container"></div>
</div>

<div id="page-sys" class="page">
    <div class="page-header">
        <h2 class="mono">03_SYSTEM</h2>
    </div>

    <div class="shelf-container" style="background: #fdfdfb; border-style: dashed;">
        <div class="shelf-label">SYSTEM_DATA_MANAGEMENT</div>
        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button onclick="exportDataToFile()" class="btn-system-action">[EXPORT_DATABASE]</button>
            <label for="import-file" class="btn-system-action" style="cursor: pointer; text-align: center;">[IMPORT_PROTOCOL]</label>
            <input type="file" id="import-file" style="display: none;" onchange="importDataFromFile(event)">
        </div>
    </div>

    <div class="shelf-container" style="background: #fdfdfb; border-style: dashed;">
        <div class="shelf-label">DICTIONARY_PROTOCOL</div>
        
        <div style="display: flex; gap: 20px; margin-top: 15px; align-items: flex-start;">
            <div style="flex: 1;">
                <label class="mono" style="font-size: 9px; color: #888;">[ 01_MASTER_CATEGORY ]</label>
                <div id="dict-cat-list" class="dict-list-box"></div>
                <div class="dict-input-wrap">
                    <input type="text" id="new-cat-input" placeholder="+ NEW_CAT">
                    <button onclick="addDict('cat')">ADD</button>
                </div>
            </div>

            <div style="flex: 1;">
                <label class="mono" style="font-size: 9px; color: #888;">
                    [ 02_SUB_LIST_FOR: <span id="current-selected-cat" style="color:#000; font-weight:900;">NONE</span> ]
                </label>
                <div id="dict-sub-list" class="dict-list-box" style="background: #f9f9f9;">
                    <div style="padding:20px; color:#ccc; font-size:10px; text-align:center;">SELECT_A_CAT_TO_EDIT_SUBS</div>
                </div>
                <div class="dict-input-wrap" id="sub-input-group" style="display:none;">
                    <input type="text" id="new-sub-input" placeholder="+ NEW_SUB">
                    <button onclick="addDict('sub')">ADD</button>
                </div>
            </div>
        </div>
    </div>

    <div style="padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="mono" style="font-size: 13px;">> ARCHIVE_LOG</div>
            <button class="btn-danger" onclick="clearArchive()" style="padding: 4px 12px; font-size: 10px;">PURGE_SYSTEM</button>
        </div>
        <div id="archive-list"></div>
    </div>
</div> 


<div id="entry-overlay">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px; border-bottom: 6px solid #000; padding-bottom: 10px;">
        <h2 class="mono" id="form-title" style="margin:0; font-size: 22px;">NEW_ENTRY_LOG</h2>
        <div onclick="closeEntry()" style="cursor:pointer; color:#ff0000 ; font-weight:900; border:1px solid #ff0000; padding:4px 12px; font-size:12px;">✘</div>
    </div>

    <input type="hidden" id="edit-id">

    <div class="form-row">
        <div class="form-group"><label>CATEGORY</label><select id="in-cat" onchange="updateInSubOptions()"></select></div>
        <div class="form-group"><label>SUB_CAT</label><select id="in-sub"><option value="未分類">┈</option></select></div>
        <div class="form-group"><label>STATUS</label><select id="in-status"><option value="庫存">STOCK</option><option value="使用中">USING</option></select></div>
    </div>

    <div class="form-row">
        <div class="form-group" style="flex:1;"><label>PRODUCT_NAME</label><input type="text" id="in-name"></div>
    </div>

    <div class="form-row">
        <div class="form-group" style="flex:2;"><label>BUY_DATE</label><input type="text" id="in-buy" placeholder="YYYYMMDD" inputmode="numeric"></div>
        <div class="form-group" style="flex:2;"><label>EXPIRY_DATE</label><input type="text" id="in-exp" placeholder="YYYYMMDD" inputmode="numeric"></div>
        <div class="form-group" style="flex:1;"><label>QTY</label><input type="number" id="in-qty" value="1" min="1" inputmode="numeric"></div>
    </div>

    <div class="form-row">
        <div class="form-group" style="flex: 1.5;">
            <label>BARCODE</label>
            <div style="display: flex; gap: 5px; align-items: center;">
                <input type="text" id="in-bar" style="flex: 1;">
                <button onclick="toggleScanner()" 
                        style="background: transparent ; color: #fff; border: none; padding: 0 10px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <span style="font-size: 14px;">📷</span>
                </button>
            </div>
        </div>
        <div class="form-group" style="flex: 1;"><label>TAGS</label><input type="text" id="in-tag"></div>
    </div>

    <div id="qr-reader-container" style="display: none; margin-bottom: 20px; width: 100%; border: 2px solid #000; overflow: hidden; background: #000;">
        <div id="qr-reader" style="width: 100%;"></div>
        <div style="text-align: center; background: #000; color: #fff; font-size: 10px; padding: 5px;" class="mono">[ SCANNING_MODE_ACTIVE ]</div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 15px;">
        <button class="btn-save-protocol" onclick="saveEntry()">
            <span>SAVE_AND_PRINT</span>
        </button>
        <div id="drop-zone" style="display: none; width: 100%; margin-top: 30px;">
            <div onclick="deleteItem()" class="btn-drop-protocol">TERMINATE_DATA_PROTOCOL</div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-btn active" onclick="tab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="tab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="tab('page-sys', this)">SYSTEM</div>
</nav>

<script>

    const STORE_DB = 'sss_db'; 
    const STORE_CFG = 'sss_cfg';

    let scannerInstance = null;

    async function toggleScanner() {
        const container = document.getElementById('qr-reader-container');
        const barcodeInput = document.getElementById('in-bar');

        // 1. 如果掃描器正在運行，則關閉它
        if (scannerInstance) {
            await stopScanner();
            return;
        }

        // 2. 顯示掃描器容器
        container.style.display = 'block';

        // 3. 初始化掃描器
        scannerInstance = new Html5Qrcode("qr-reader");

        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 120 }, // 針對條碼優化的長方框
            aspectRatio: 1.777778 
        };

        scannerInstance.start(
            { facingMode: "environment" }, // 使用後鏡頭
            config,
            (decodedText) => {
                // 成功掃描後的動作
                barcodeInput.value = decodedText;
                
                // 手機震動回饋 (選用)
                if (navigator.vibrate) navigator.vibrate(100);
                
                // 自動關閉掃描器
                stopScanner();
            },
            (errorMessage) => {
                // 掃描中... 靜默處理
            }
        ).catch(err => {
            console.error("相機啟動失敗:", err);
            alert("無法啟動相機。請確保在 HTTPS 環境下使用，並已授予權限。");
            container.style.display = 'none';
        });
    }

    async function stopScanner() {
        if (scannerInstance) {
            await scannerInstance.stop();
            scannerInstance = null;
        }
        document.getElementById('qr-reader-container').style.display = 'none';
    }
    function save() {

    function renderDict() {
        // 1. 渲染大類清單
        const catList = cfg.cats ? cfg.cats.split(',').filter(s => s.trim()) : [];
        document.getElementById('dict-cat-list').innerHTML = catList.map(item => `
            <div class="dict-row ${item === activeCat ? 'active-cat-row' : ''}" onclick="selectCatForSub('${item}')">
                <span>${item}</span>
                <span class="del-btn" onclick="event.stopPropagation(); delDict('cat', '${item}')">✘</span>
            </div>
        `).join('');

        // 2. 渲染對應的子類清單
        const subListBox = document.getElementById('dict-sub-list');
        const subInputGroup = document.getElementById('sub-input-group');
        const titleLabel = document.getElementById('current-selected-cat');

        if (!activeCat) {
            subListBox.innerHTML = '<div style="padding:20px; color:#ccc; font-size:10px; text-align:center;">SELECT_A_CAT_FIRST</div>';
            subInputGroup.style.display = 'none';
            titleLabel.innerText = "NONE";

        }

        subInputGroup.style.display = 'flex';

        // 從 cfg.subCats 物件中抓取該大類的小類資料
        // 如果 cfg.subCats 還是舊的字串格式，這裡需要做一個自動轉型相容
        if (typeof cfg.subCats === 'string') cfg.subCats = {}; 
        
        const subData = cfg.subCats[activeCat] || "";
        const subList = subData.split(',').filter(s => s.trim());
        
        subListBox.innerHTML = subList.map(item => `

    }

    // 修正後的新增邏輯
    function addDict(type) {
        if (type === 'cat') {
            const val = document.getElementById('new-cat-input').value.trim();
            if (!val) return;
            let list = cfg.cats ? cfg.cats.split(',').filter(s => s.trim()) : [];
            if (!list.includes(val)) {
                list.push(val);
                cfg.cats = list.join(',');
                // 初始化該大類的小類空間
                if (!cfg.subCats) cfg.subCats = {};
                cfg.subCats[val] = "";
            }
            document.getElementById('new-cat-input').value = "";
        } else {
            const val = document.getElementById('new-sub-input').value.trim();
            if (!val || !activeCat) return;
            let list = cfg.subCats[activeCat] ? cfg.subCats[activeCat].split(',').filter(s => s.trim()) : [];
            if (!list.includes(val)) {
                list.push(val);
                cfg.subCats[activeCat] = list.join(',');
            }
            document.getElementById('new-sub-input').value = "";
        }
        save(); refresh();
    }
        
// 統一刪除辭典條目
    function delDict(type, val) {
        const key = type === 'cat' ? 'cats' : 'subCats';
        
        // 1. 刪除辭典中的定義
        let list = cfg[key].split(',').filter(s => s.trim());
        cfg[key] = list.filter(i => i !== val).join(',');

        // 2. 連動資料庫：將已刪除的分類設為 "未分類"
        if (confirm(`刪除「${val}」辭典定義後，是否要將資料庫中現有標記為「${val}」的物品同步設為「未分類」？`)) {
            db.forEach(item => {
                if (type === 'cat' && item.category === val) {
                    item.category = "未分類";
                } else if (type === 'sub' && item.subCat === val) {
                    item.subCat = "未分類";
                }
            });
        }

        save(); 
        refresh();
    }

    function updateInSubOptions() {
        const cat = document.getElementById('in-cat').value;
        const subEl = document.getElementById('in-sub');
        if (!subEl) return;

        // 1. 如果大類是空的（預設的 ---），鎖定子類
        if (!cat) {
            subEl.innerHTML = '<option value="未分類">▹</option>'
            subEl.disabled = true;
            return;
        }
        subEl.disabled = false;

        // 2. 從 cfg.subCats 物件中根據「選中的大類」抓取對應的小類
        let subData = "";
        if (cfg.subCats && typeof cfg.subCats === 'object') {
            subData = cfg.subCats[cat] || "";
        }

        const dictSubs = subData.split(',').filter(s => s.trim());
        
        // 3. 混合資料庫已存在的（雙重保障）
        const dbSubs = [...new Set(db.filter(i => i.category === cat).map(i => i.subCat))];
        const finalOptions = [...new Set([...dictSubs, ...dbSubs])].filter(s => s && s !== "未分類");

        subEl.innerHTML = `<option value="未分類">▹</option>` + 
            finalOptions.sort().map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function autoFormatDate(inputVal) {
        let val = inputVal.replace(/\D/g, ''); // 只留數字
        if (val.length === 8) {
            return val.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
        }
        return inputVal; // 如果長度不對，就回傳原值
    }   

    function saveEntry() {
        const eid = document.getElementById('edit-id').value;
        const cat = document.getElementById('in-cat').value;
            if(!cat) return alert("請先選擇大分類項目");
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const baseName = document.getElementById('in-name').value;
            if(!baseName) return alert("MISSING_NAME");
        const newItem = {
            id: String(Date.now()), // 關鍵：強制轉為字串
            name: baseName,
            // ... 其他欄位
        };
        // --- 核心改動：日期格式化邏輯 ---
        const toStandardDate = (val) => {
            let clean = val.replace(/\D/g, ''); // 移除所有非數字
            if (clean.length === 8) {
                return `${clean.substring(0, 4)}-${clean.substring(4, 6)}-${clean.substring(6, 8)}`;
            }
            return val; // 如果不是8碼（可能已經是 YYYY-MM-DD），就維持原樣
        };
        const data = {
        category: document.getElementById('in-cat').value,
        subCat: document.getElementById('in-sub').value || "未分類",
        tags: document.getElementById('in-tag').value,
        // 儲存前強制格式化
        buyDate: toStandardDate(document.getElementById('in-buy').value),
        expiry: toStandardDate(document.getElementById('in-exp').value),
        barcode: document.getElementById('in-bar').value,
        status: document.getElementById('in-status').value
    };

    if(eid) {
        const idx = db.findIndex(x => x.id == eid);
        if(idx !== -1) db[idx] = { ...db[idx], ...data, name: baseName };
    } else {
        for(let i=0; i<qty; i++) {
            const newName = qty > 1 ? `${baseName} (${i+1}/${qty})` : baseName;
            // 確保新生成的 ID 也是字串格式，方便後續比對
            db.push({ id: String(Date.now() + i), name: newName, ...data });
        }
    }
    save(); closeEntry(); refresh();
}

    function useItem(id) {
        const i = db.find(x => x.id == id);
        if (!i) return;

        // 1. 執行開啟邏輯
        i.status = '使用中';
        i.openDate = new Date().toISOString().split('T')[0];
        save();
        refresh();

        // 2. 統一宣告變數（只宣告一次，解決 SyntaxError）
        const currentCat = i.category || "";
        const currentSub = i.subCat || "";
        const currentName = i.name || "";

        // 3. 聯動提醒邏輯：僅限頭髮產品的同系列匹配
        if (currentCat.includes('頭髮') || currentSub.includes('洗髮')) {
            
            // 抓取品牌前綴 (取名稱前 3 字)
            const brandKey = currentName.substring(0, 3); 

            const related = db.filter(item => {
                const itemName = item.name || "";
                const itemSub = item.subCat || "";
                
                return item.id != id && 
                    item.status === '庫存' && 
                    itemName.includes(brandKey) && // 品牌匹配
                    (itemSub.includes('護髮') || itemSub.includes('潤髮') || itemSub.includes('髮膜') || itemSub.includes('頭皮'));
            });

            if (related.length > 0) {
                const suggestions = related.map(r => `• ${r.name}`).join('\n');
                
                setTimeout(() => {
                    alert(`[ HAIR_CARE_PROTOCOL ]\n\n偵測到同系列配套：\n${suggestions}\n\n建議同步取出使用。`);
                }, 300);
            }
        }
    }

    function doCheck() {
        const q = document.getElementById('check-input').value.trim().toLowerCase();
        const res = document.getElementById('check-result');
        if(!q) { res.innerHTML = ""; return; }
        
        // 取得今天日期（格式：YYYY-MM-DD）
        const today = new Date().toISOString().split('T')[0];
        
        // 1. 核心過濾與排序
        const activeItems = db.filter(i => i.status !== '已用完').sort((a, b) => {
            return (b.status === '使用中') - (a.status === '使用中');
        });

        // 2. 搜尋機制
        let matches = activeItems.filter(i => {
            // 建立一個安全轉換字串的 helper
            const s = (f) => {
                const val = i[f] ?? ""; 
                return String(val).toLowerCase(); // 強制轉成字串，解決數字 barcode 無法 toLowerCase 的問題
            };
        
            // 搜尋輸入框的值 (q 已經在前面處理過 trim() 與 toLowerCase())
            return s('name').includes(q) || 
                   s('barcode').includes(q) || 
                   s('tags').includes(q) || 
                   s('subCat').includes(q) ||
                   s('category').includes(q); // 增加 category 確保大分類也能被查到
        });
        
        let isDiscoveryMode = false;
        if (matches.length === 0) {
            matches = activeItems.filter(i => {
                const s = (f) => (i[f] || "").toLowerCase() + (i['category'] || "").toLowerCase();
                return s.includes(q);
            });
            if (matches.length > 0) isDiscoveryMode = true;
        }

        if (matches.length === 0) {
            res.innerHTML = `<div style="color:#ff0000; padding:15px; border:1px dashed #000; margin-top:10px; font-size:10px; background:#fff;">[ STATUS: NO_MATCH_FOUND ]</div>`;
            return;
        }

        const vCount = matches.filter(i => i.status === '庫存').length;
        const uCount = matches.filter(i => i.status === '使用中').length;
        const boardBg = isDiscoveryMode ? '#ff9800' : '#000';

        res.innerHTML = `
            <div style="background:${boardBg}; color:${isDiscoveryMode ? '#000' : '#fff'}; padding:15px; margin:10px 0 20px 0; display:flex; justify-content:space-between; align-items:center; box-shadow: 6px 6px 0px #eee;">
                <div class="mono">
                    <div style="font-size: 10px; opacity: 0.6; margin-bottom: 5px;">${isDiscoveryMode ? 'CATEGORY_MATCHED' : 'DATABASE_CHECK'}</div>
                    <div style="font-size: 28px; font-weight: 900; letter-spacing: -1px;">MATCHED: ${matches.length}</div>
                </div>
                <div class="mono" style="text-align:right; font-size: 10px; opacity: 0.8;">STOCK: ${vCount}<br>USING: ${uCount}</div>
            </div>
            
            <div style="max-height: 400px; overflow-y: auto;">
                ${matches.map(i => {
                    const isUsing = i.status === '使用中';
                    // 效期推算
                    let finalExp = i.expiry || (i.buyDate ? `${parseInt(i.buyDate.split('-')[0]) + 3}-${i.buyDate.split('-')[1]}-${i.buyDate.split('-')[2]}` : "--");
                    
                    // 💡 判斷是否過期
                    const isExpired = finalExp !== "--" && finalExp < today;
                    const expColor = isExpired ? '#ff0000' : (isUsing ? '#000' : '#999');

                    return `
                    <div style="background: ${isUsing ? (isExpired ? '#fff0f0' : '#fffce7') : 'transparent'}; 
                                border-bottom: 1.5px solid #000; 
                                padding: 12px ${isUsing ? '10px' : '0'}; 
                                margin-bottom: ${isUsing ? '8px' : '0'}; 
                                display: flex; align-items: flex-start; gap: 10px;">
                        <div style="flex: 1; min-width: 0;">
                            <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap;">
                                ${isUsing ? '<span style="background:#000; color:#fff; font-size:8px; padding:1px 4px; font-weight:900;">ACTIVE</span>' : ''}
                                ${isExpired ? '<span style="background:#ff0000; color:#fff; font-size:8px; padding:1px 4px; font-weight:900;">EXPIRED</span>' : ''}
                                <span class="mono" style="font-size: 9px; border: 1px solid #ccc; color: #888; padding: 0 3px;">${i.subCat}</span>
                                ${i.tags ? i.tags.split(',').map(tag => `<span class="mono" style="font-size: 9px; color: #000; font-weight:900;">#${tag.trim()}</span>`).join(' ') : ''}
                            </div>

    function renderVault() {
    const container = document.getElementById('vault-shelves-container');
    const usingItems = db.filter(i => i.status === '使用中');
        usingItems.sort((a, b) => {
            const dateA = a.openDate || "9999-12-31";
            const dateB = b.openDate || "9999-12-31";
            return dateA.localeCompare(dateB);
        });
    const activeItems = db.filter(i => i.status === '庫存');
        activeItems.sort((a, b) => {
        const getExp = (item) => {
            if (item.expiry) return item.expiry;
            if (item.buyDate) {
                const p = item.buyDate.split('-');
                return `${parseInt(p[0]) + 3}-${p[1]}-${p[2]}`;
            }
            return "9999-12-31";
        };
        return getExp(a).localeCompare(getExp(b));
    });
    const grouped = activeItems.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
    }, {});

    let usingSection = "";
    if (usingItems.length > 0) {
        // 取得今天日期比對效期
        const today = new Date().toISOString().split('T')[0];

        usingSection = `
            <div class="shelf-container" >
                <div class="shelf-label" style="background: #000; color: #fffce7; -webkit-text-fill-color: #fffce7 !important;">ACTIVE_USING_LOG</div>
                <div style="padding-top: 10px;">
                    ${usingItems.map(i => {
                        const displayOpenDate = i.openDate || "N/A";
                        const days = i.openDate ? Math.floor((new Date() - new Date(i.openDate)) / (1000 * 60 * 60 * 24)) : 0;

                        // 💡 效期推算與過期判斷
                        const finalExp = i.expiry || (i.buyDate ? `${parseInt(i.buyDate.split('-')[0]) + 3}-${i.buyDate.split('-')[1]}-${i.buyDate.split('-')[2]}` : "--");
                        const isExpired = finalExp !== "--" && finalExp < today;

                        return `
                        <div class="item-line" style="flex-direction: column; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.1); background: ${isExpired ? 'rgba(255,0,0,0.05)' : 'rgba(255, 247, 5, 0.11)'};">
                            <div style="width: 100%; display: flex; align-items: flex-start; line-height: 1;">
                                <span class="mono" style="font-size:9px; border:1px solid #000; padding:1px 3px; background: #000; color: #fff; white-space:nowrap; margin-top:2px;">${i.subCat}</span>
                                <span class="mono" style="font-size:15px; margin-left:8px; font-weight:900; word-break: break-all; flex: 1; letter-spacing: -0.5px; color: ${isExpired ? '#ff0000' : '#000'};">
                                    ${isExpired ? '⚠️ ' : ''}${i.name}
                                </span>
                            </div>

                            <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: -15px;">
                                <div class="mono" style="font-size: 10px; line-height: 1.2;">
                                    <div style="margin-top: 6px;">
                                        <span style="color: #999;">⏭︎⏭︎</span> 
                                        <span style="${isExpired ? 'background:#ff0000; color:#fff; padding:0 4px; font-weight:900;' : 'color:#666;'}">
                                            ${finalExp} ${isExpired ? '❕' : ''}</span> <span style=" background:transparent; color:#ff0000;">(${days}DAYS)
                                        </span>
                                    </div>
                                </div>

                                <div style="display: flex; gap: 8px; align-items: center;">
                                    <button onclick="editItem('${i.id}')" class="btn-text-link" style="border: none; padding: 4px 12px; font-size: 16px; font-weight: 900; letter-spacing: 1px;">⏮︎</button>
                                    <button onclick="finishItem('${i.id}')" class="btn-off-action" style="border: none; padding: 4px 12px; font-size: 16px; font-weight: 900; letter-spacing: 1px;">⏹︎</button>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
    }

    let stockSection = `
        <details style="margin-top: 20px;">
            <summary class="mono" style="text-align: center; cursor: pointer; padding: 12px; background: #eee; border: 2px solid #000; list-style: none; font-size: 12px; letter-spacing: 2px;">
                ▼ CLICK_TO_EXPAND_ARCHIVE_VAULT
            </summary>
            <div style="margin-top: 25px;">
                ${Object.keys(grouped).map(cat => `
                    <div class="shelf-container" style="border-color: #ddd;">
                        <div class="shelf-label" style="background: #888;">${cat.toUpperCase()}</div>
                        <div style="padding-top: 5px;">
                            ${grouped[cat].map(i => {
                                // --- 1. 完全保留並補強你的日期計算邏輯 ---
                                let finalExp = i.expiry;
                                let isAutoExp = false;
                                if (!finalExp || finalExp.trim() === "") {
                                    isAutoExp = true;
                                    if (i.buyDate && i.buyDate.includes('-')) {
                                        const parts = i.buyDate.split('-');
                                        finalExp = `${parseInt(parts[0]) + 3}-${parts[1]}-${parts[2]}`;
                                    } else { finalExp = "--"; }
                                }

                                // --- 2. 新增：灰度判斷 (today 變數需在函數開頭定義) ---
                                const today = new Date().toISOString().split('T')[0];
                                const isExpired = finalExp !== "--" && finalExp < today;

                                // --- 3. 補強：灰度化樣式 (過期則淡化，但不消失) ---
                                const expiredStyle = isExpired ? 'opacity: 0.4; filter: grayscale(100%);' : '';

                                return `
                                <div class="item-line" style="flex-direction: column; align-items: flex-start; gap: 6px; padding: 12px 0; border-bottom: 1px solid #eee; ${expiredStyle}">
                                    <div style="width: 100%; display: flex; align-items: flex-start;">
                                        <span class="mono" style="font-size:9px; border:1px solid #888; padding:1px 4px; color:#888; white-space:nowrap; margin-top:2px;">${i.subCat}</span>
                                        <span class="mono" style="font-size:15px; margin-left:8px; font-weight:900; word-break: break-all; flex: 1; line-height: 1.2; color: ${isExpired ? '#999' : '#000'};">
                                            ${i.name}
                                        </span>
                                    </div>

                                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: flex-end; margin-top: -10px;">
                                        <div class="mono" style="font-size: 10px; color: ${isExpired ? '#ccc' : (isAutoExp ? '#ff9800' : '#000')}; letter-spacing: 0.5px; ">
                                            <span style="opacity: 0.4;">EXP//</span> ${finalExp} 
                                            ${isAutoExp ? '<span style="font-size:8px;">(*)</span>' : ''} 
                                            ${isExpired ? '<span style="margin-left:5px;">[X]</span>' : ''}
                                        </div>
                                        <div style="display: flex; gap: 8px;">
                                            <button onclick="editItem('${i.id}')" class="btn-text-link" style="padding: 4px 12px; font-size: 16px;">⏮︎</button>
                                            <button onclick="useItem('${i.id}')" class="btn-on-action" style="padding: 4px 12px; font-size: 16px;">⏭︎</button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`).join('')}
            </div>
        </details>`;
    container.innerHTML = usingSection + stockSection;
    renderArchiveLog();
}

    function refresh() {
        // 【自動遷移邏輯】如果 subCats 還是舊字串，進行智慧分配
        if (typeof cfg.subCats === 'string') {
            console.log("偵測到舊版子分類格式，正在啟動自動遷移...");
            const oldSubStr = cfg.subCats;
            const allSubs = oldSubStr.split(',').filter(s => s.trim());
            cfg.subCats = {}; // 轉型為物件

            // 根據資料庫現有的配對關係自動歸類
            db.forEach(item => {
                if (item.category && item.subCat) {
                    if (!cfg.subCats[item.category]) cfg.subCats[item.category] = "";
                    let currentList = cfg.subCats[item.category].split(',').filter(s => s.trim());
                    if (!currentList.includes(item.subCat)) {
                        currentList.push(item.subCat);
                        cfg.subCats[item.category] = currentList.join(',');
                    }
                }
            });
            save(); // 儲存遷移後的結果
        }

        // 2. 更新下拉選單
        const inCat = document.getElementById('in-cat');
        if (inCat) {
            inCat.innerHTML = '<option value="">┈1161</option>' + 
                (cfg.cats || "").split(',').filter(c => c.trim())
                .map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        }

        const pickCat = document.getElementById('pick-cat');
        if (pickCat) {
            pickCat.innerHTML = '<option value=""> ▼ CATEGORY ▼</option>' + 
                (cfg.cats || "").split(',').filter(c => c.trim())
                .map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        }

        // 💡 重要：執行一次篩選聯動，確保子選單不會殘留上一次的資料
        updatePickSub();

        renderVault(); 
        renderDict();
    }

    function clearArchive() {
        const archiveCount = db.filter(i => i.status === '已用完').length;
        if (archiveCount === 0 || !confirm(`CRITICAL: PURGE ${archiveCount} RECORDS?`)) return;
        db = db.filter(i => i.status !== '已用完'); save(); refresh();
    }

    function updatePickSub() {
        const cat = document.getElementById('pick-cat').value;
        const subS = document.getElementById('pick-sub');
        if (!subS) return;

        // A. 如果沒選大類，鎖定子類
        if (!cat) {
            subS.innerHTML = '<option value="">▹</option>';
            subS.disabled = true;
            return;
        }
        subS.disabled = false;

        // B. 正確從「物件格式」的辭典中抓取對應小類
        let dictSubs = [];
        if (cfg.subCats && typeof cfg.subCats === 'object' && cfg.subCats[cat]) {
            dictSubs = cfg.subCats[cat].split(',').filter(s => s.trim());
        }

        // C. 同時從資料庫 (db) 找出該大類下「現有庫存」的子分類 (雙重保障)
        const dbSubs = [...new Set(
            db.filter(i => i.category === cat && i.status === '庫存')
            .map(i => i.subCat)
        )];

        // D. 合併辭典定義與資料庫現有項，去重並過濾
        const finalOptions = [...new Set([...dictSubs, ...dbSubs])].filter(s => s && s !== "未分類");

        if (finalOptions.length === 0) {
            subS.innerHTML = '<option value="">▹</option>';
        } else {
            subS.innerHTML = '<option value="">▹</option>' + 
                finalOptions.sort().map(s => `<option value="${s}">${s}</option>`).join('');
        }
        
        // 每當大類切換，自動觸發一次推薦
        getRecommended();
    }

    function getRecommended() {
    const cat = document.getElementById('pick-cat').value;
    const sub = document.getElementById('pick-sub').value;
    const area = document.getElementById('recommend-area');
    
    // 取得搜尋框內容，用來支援「我想用美白」這種特定需求
    const searchTag = document.getElementById('check-input')?.value.trim().toLowerCase() || "";

    if (!cat) {
        area.innerHTML = `<div class="mono" style="padding:20px; text-align:center; color:#888;">[ SELECT_CATEGORY_TO_START_PROTOCOL ]</div>`;
        return;
    }

    let items = db.filter(i => i.status === '庫存' && i.category === cat);
    if (sub) items = items.filter(i => i.subCat === sub);
    
    // 如果有輸入關鍵字（如美白），優先篩選
    if (searchTag) {
        items = items.filter(i => 
            (i.name || "").toLowerCase().includes(searchTag) || 
            (i.tags || "").toLowerCase().includes(searchTag)
        );
    }

    // 效期排序
    items.sort((a, b) => {
        const getExp = (item) => {
            if (item.expiry) return item.expiry;
            if (item.buyDate && item.buyDate.includes('-')) {
                const p = item.buyDate.split('-');
                return `${parseInt(p[0]) + 3}-${p[1]}-${p[2]}`;
            }
            return "9999-12-31";
        };
        return getExp(a).localeCompare(getExp(b));
    });

    const top3 = items.slice(0, 3);
    const labelColors = ['#ff4d4d', '#ffa64d', '#ffdb4d']; // 恢復原本的紅、橘、黃標籤色

    area.innerHTML = top3.length ? top3.map((i, idx) => {
        let finalExp = i.expiry;
        let isAutoExp = false;

        if (!finalExp || finalExp.trim() === "") {
            isAutoExp = true;
            if (i.buyDate) {
                const parts = i.buyDate.split('-');
                finalExp = `${parseInt(parts[0]) + 3}-${parts[1]}-${parts[2]}`;
            } else { finalExp = "UNKNOWN"; }
        }

        return `
        <div style="border: 2px solid #000; margin: 25px 0; padding: 18px; position: relative; background: #fff; box-shadow: 6px 6px 0px #eee;">
            <div class="mono" style="position: absolute; top: -12px; left: 12px; background: ${labelColors[idx] || '#ccc'}; color: #000; font-size: 11px; padding: 3px 10px; font-weight: 900;">
                PICK_0${idx+1} ${isAutoExp ? '❕' : ''}
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span class="mono" style="font-size: 10px; border: 1px solid #ccc; padding: 1px 4px; color: #666; background: #f4f4f4;">${i.subCat}</span>
                    <span class="mono" style="font-size: 15px; font-weight:900; margin-left: 8px;">${i.name}</span>
                    <div class="mono" style="font-size: 10px; color: ${isAutoExp ? '#ff9800' : '#aaa'}; margin-top: 6px; font-weight: bold;">
                        > EXP: ${finalExp} ${isAutoExp ? '⁉️' : ''}
                    </div>
                </div>
                <button onclick="quickUse('${i.id}')" class="btn-on-action" style="color: #ff0000 !important ; border:none; padding: 8px 16px; font-weight:900; cursor:pointer;">✔</button>
            </div>
        </div>`;
    }).join('') : `<div class="mono" style="padding:30px; text-align:center; color:#aaa; border:1px dashed #aaa;">[ DATABASE_QUERY_EMPTY ]</div>`;
}

    function renderArchiveLog() {
        const archiveContainer = document.getElementById('archive-list');
        if (!archiveContainer) return;

        const finishedItems = db.filter(i => i.status === '已用完');
        finishedItems.sort((a, b) => (b.finishDate || "").localeCompare(a.finishDate || ""));

        if (finishedItems.length === 0) {
            archiveContainer.innerHTML = `<div class="mono" style="color: #111;">> NO_LOG_ENTRIES</div>`;
            return;
        }

        archiveContainer.innerHTML = `
            <div style="
                background: #000; 
                padding: 20px; 
                font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
                -webkit-font-smoothing: none; 
                -moz-osx-font-smoothing: grayscale;
                border-left: 2px solid #002200;
            ">
                ${finishedItems.map(i => {
                    const rawDate = (i.finishDate || '00000000').replace(/-/g, '');
                    
                    return `
                    <div style="margin-bottom: 2px; display: flex; align-items: baseline; letter-spacing: -0.5px;">
                        <span style="color: #004400; font-size: 11px; margin-right: 15px;">${rawDate}</span>
                        <span style="
                            color: #006600; 
                            font-size: 11px; 
                            opacity: 0.5; 
                            flex-grow: 1;
                            /* 💡 讓字體看起來更緊湊、不那麼精緻 */
                            text-transform: uppercase;
                        ">
                            ${i.name}
                        </span>
                        <span style="color: #002200; font-size: 9px;">[X]</span>
                    </div>
                    `;
                }).join('')}
                <div style="color: #002200; font-size: 9px; margin-top: 20px; border-top: 1px solid #050505;">
                    RAW_DATA_DUMP_COMPLETE
                </div>
            </div>
        `;
    }

    function quickUse(id) { useItem(id); getRecommended(); }
    function saveCfg() { cfg.cats = document.getElementById('cfg-cats').value; save(); refresh(); }
    
    // --- [備份] 匯出檔案 (對齊 retail_v52 版本) ---
    function exportDataToFile() {
        // 直接使用變數 db，並確保它有內容
        if (!db || db.length === 0) {
            alert("ERROR: DATABASE_IS_EMPTY");
            return;
        }
        
        // 包裝完整備份：包含資料 (db) 與 配置 (cfg)
        const backupData = {
            version: "RETAIL_V52",
            timestamp: new Date().toISOString(),
            db: db,   // 這裡直接引用你的全域變數 db
            cfg: cfg  // 同時備份你的分類配置
        };

        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
        a.href = url;
        a.download = `RT_backup_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 0);
    }

    function importDataFromFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                
                // 檢查是否為有效的備份結構
                const importedDb = json.db || (Array.isArray(json) ? json : null);
                
                if (!importedDb) {
                    throw new Error("INVALID_FORMAT");
                }

                if (confirm(`DETECTED: ${importedDb.length} RECORDS. OVERWRITE CURRENT DATABASE?`)) {
                    // 更新全域變數
                    db = importedDb;
                    
                    // 如果檔案包含配置，同步還原
                    if (json.cfg) {
                        cfg = json.cfg;
                    }

                    // 執行存檔與刷新
                    save(); 
                    refresh();
                    
                    alert("PROTOCOL_RESTORE_SUCCESS");
                    location.reload(); 
                }
            } catch (err) {
                alert("CRITICAL_ERROR: FILE_CORRUPTED_OR_INVALID");
                console.error(err);
            }
        };
        reader.readAsText(file);
        event.target.value = ''; // 重置以支援重複選取同一檔案
    }


    window.onload = () => { 
    setupDateAutoFormat('in-buy'); 
    setupDateAutoFormat('in-exp'); 
    if(document.getElementById('check-input')) document.getElementById('check-input').value = '';
    refresh(); 
};

</script>
