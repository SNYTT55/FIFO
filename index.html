<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYS_INVENTORY_ULTIMATE</title>
    <style>
        :root {
            --sys-blue: #001f3f;
            --sys-bg: #ffffff;
            --sys-border: #000000;
            --sys-gray: #f2f2f2;
            --sys-accent: #d32f2f;
            --sys-font: "Courier New", Courier, monospace;
        }

        * { box-sizing: border-box; font-family: sans-serif; }
        .mono { font-family: var(--sys-font); font-weight: bold; }
        body { background-color: var(--sys-bg); color: #000; margin: 0; padding-bottom: 70px; }

        /* 導航 */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; height: 60px; z-index: 1000; }
        .nav-btn { flex: 1; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border-right: 1px solid #333; }
        .nav-btn.active { color: #00ff00; background: #222; }

        /* 頁面 */
        .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }
        h2 { border-bottom: 3px solid #000; padding-bottom: 5px; font-size: 18px; margin-bottom: 20px; }

        /* 賣場元素 */
        .terminal-box { border: 2px solid #000; padding: 15px; margin-bottom: 20px; background: #fff; }
        input, select { border: 1px solid #000; border-radius: 0; padding: 8px; font-size: 14px; }
        .btn { background: #000; color: #fff; border: none; padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn:hover { background: #333; }

        /* 表格輸入區 */
        .entry-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .entry-table th { background: #000; color: #fff; font-size: 11px; padding: 8px; text-align: left; }
        .entry-table td { border: 1px solid #000; padding: 0; }
        .entry-table input, .entry-table select { width: 100%; border: none; height: 35px; outline: none; }

        /* 推薦卡片 */
        .tag-card { border: 2px solid #000; padding: 20px; position: relative; background: #fff; box-shadow: 6px 6px 0px #ddd; }
        .tag-series { display: inline-block; background: #000; color: #fff; padding: 2px 8px; font-size: 10px; margin-bottom: 10px; }
        
        /* 列表樣式 */
        .list-row { border-bottom: 1px solid #ddd; padding: 12px 0; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

<div id="page-search" class="page active">
    <h2 class="mono">01_QUICK_SEARCH</h2>
    <div class="terminal-box">
        <label class="mono" style="font-size:11px;">STOCK_CHECK_REDUNDANCY</label>
        <input type="text" id="q-search" class="mono" placeholder="SCAN BARCODE OR NAME..." oninput="checkStock()" style="width:100%; margin-top:5px;">
        <div id="search-feedback" class="mono" style="margin-top:10px; font-size:12px;"></div>
    </div>

    <div class="terminal-box" style="border-left: 10px solid var(--sys-accent);">
        <label class="mono" style="font-size:11px;">FIFO_LINKAGE_ENGINE</label>
        <div style="display:flex; gap:10px; margin: 10px 0;">
            <select id="rec-cat" onchange="updateSubOptions()" style="flex:1;">
                <option value="">CATEGORY</option>
                <option value="家用品">HOUSEHOLD</option>
                <option value="保養品">SKINCARE</option>
                <option value="保健食品">HEALTH</option>
            </select>
            <select id="rec-sub" onchange="getRecommendation()" style="flex:1;" disabled>
                <option value="">SUB_CAT</option>
            </select>
        </div>
        <div id="rec-display">
            <div class="mono" style="text-align:center; color:#ccc; padding:30px;">READY_TO_PROCESS...</div>
        </div>
    </div>
</div>

<div id="page-vault" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 class="mono">02_WAREHOUSE_INVENTORY</h2>
        <button class="btn mono" onclick="openBulkModal()">+ BATCH_ENTRY</button>
    </div>
    <div id="vault-list"></div>
</div>

<div id="page-sys" class="page">
    <h2 class="mono">03_DATA_MANAGEMENT</h2>
    <div class="terminal-box">
        <button class="btn mono" style="width:100%; margin-bottom:10px;" onclick="exportData()">EXPORT_BACKUP_STRING</button>
        <textarea id="io-box" class="mono" style="width:100%; height:100px; border:1px solid #000;" placeholder="PASTE_DATA_FOR_IMPORT..."></textarea>
        <button class="btn mono" style="width:100%; margin-top:10px; background:#eee; color:#000;" onclick="importData()">IMPORT_OVERWRITE</button>
    </div>
    <div class="mono" style="font-size:12px; color:#999; margin-bottom:10px;">HISTORY_ARCHIVE:</div>
    <div id="archive-list"></div>
</div>

<div id="bulk-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; overflow-y:auto;">
    <div style="background:#fff; width:95%; max-width:1000px; margin:20px auto; padding:20px; border:3px solid #000;">
        <h2 class="mono">📦 BATCH_RECEIVING_LOG / 批次進貨單</h2>
        <div style="overflow-x:auto;">
            <table class="entry-table">
                <thead>
                    <tr>
                        <th>NAME 品名</th>
                        <th>CAT 分類</th>
                        <th>TAGS/SERIES 標籤(空格隔開)</th>
                        <th>BUY_DATE 購買日</th>
                        <th>BARCODE 條碼</th>
                    </tr>
                </thead>
                <tbody id="bulk-body">
                    </tbody>
            </table>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn mono" onclick="addBulkRow()">+ ADD_ROW</button>
            <button class="btn mono" style="background:green;" onclick="confirmBulkSave()">CONFIRM_SAVE</button>
            <button class="btn mono" style="background:#666;" onclick="closeBulkModal()">EXIT</button>
        </div>
    </div>
</div>

<nav class="nav mono">
    <div class="nav-btn active" onclick="showTab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="showTab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="showTab('page-sys', this)">SYSTEM</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('retail_inv_final') || '[]');

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        refresh();
    }

    function refresh() {
        renderVault();
        renderArchive();
        updateSubOptions();
    }

    // --- 批次輸入邏輯 ---
    function openBulkModal() {
        document.getElementById('bulk-modal').style.display = 'block';
        document.getElementById('bulk-body').innerHTML = '';
        for(let i=0; i<3; i++) addBulkRow(); // 預設三行
    }

    function addBulkRow() {
        const tr = document.createElement('tr');
        tr.className = "bulk-row";
        tr.innerHTML = `
            <td><input type="text" class="b-name"></td>
            <td><select class="b-cat"><option value="家用品">家用品</option><option value="保養品">保養品</option><option value="保健食品">保健食品</option></select></td>
            <td><input type="text" class="b-tags" placeholder="#系列名標籤"></td>
            <td><input type="date" class="b-date" value="${new Date().toISOString().split('T')[0]}"></td>
            <td><input type="text" class="b-barcode"></td>
        `;
        document.getElementById('bulk-body').appendChild(tr);
    }

    function confirmBulkSave() {
        const rows = document.querySelectorAll('.bulk-row');
        rows.forEach(row => {
            const name = row.querySelector('.b-name').value;
            if(name) {
                db.push({
                    id: Date.now() + Math.random(),
                    name: name,
                    category: row.querySelector('.b-cat').value,
                    tags: row.querySelector('.b-tags').value,
                    buyDate: row.querySelector('.b-date').value,
                    barcode: row.querySelector('.b-barcode').value,
                    status: '庫存'
                });
            }
        });
        save();
        closeBulkModal();
        refresh();
    }

    function closeBulkModal() { document.getElementById('bulk-modal').style.display = 'none'; }

    // --- 搜尋與關聯推薦 ---
    function checkStock() {
        const v = document.getElementById('q-search').value.toLowerCase();
        const fb = document.getElementById('search-feedback');
        if(!v) { fb.innerHTML = ''; return; }
        const match = db.filter(i => i.status !== '已用完' && (i.name.toLowerCase().includes(v) || i.barcode === v));
        fb.innerHTML = match.length > 0 ? `<span style="color:var(--sys-accent)">[MATCH_FOUND: ${match.length}]</span>` : `<span style="color:green">[UNIQUE_ITEM]</span>`;
    }

    function updateSubOptions() {
        const cat = document.getElementById('rec-cat').value;
        const sub = document.getElementById('rec-sub');
        if(!cat) { sub.disabled = true; return; }
        const tags = new Set();
        db.filter(i => i.category === cat && i.status !== '已用完').forEach(i => i.tags.split(' ').forEach(t => tags.add(t)));
        sub.innerHTML = '<option value="">SUB_CAT</option>' + Array.from(tags).map(t => `<option value="${t}">${t}</option>`).join('');
        sub.disabled = false;
    }

    function getRecommendation() {
        const cat = document.getElementById('rec-cat').value;
        const sub = document.getElementById('rec-sub').value;
        const display = document.getElementById('rec-display');
        if(!sub) return;

        let items = db.filter(i => i.category === cat && i.status !== '已用完' && i.tags.includes(sub));
        items.sort((a,b) => new Date(a.buyDate) - new Date(b.buyDate)); // FIFO

        if(items.length > 0) {
            const best = items[0];
            const seriesTag = best.tags.split(' ').find(t => t.startsWith('#'));
            let linked = "";

            if(seriesTag) {
                const links = db.filter(i => i.id !== best.id && i.status === '庫存' && i.tags.includes(seriesTag));
                if(links.length > 0) {
                    linked = `<div style="background:#f9f9f9; padding:10px; border-top:2px solid #000; margin-top:15px; text-align:left;">
                        <span class="mono" style="font-size:10px; color:var(--sys-accent);">LINKED_SERIES_DETECTED: ${seriesTag}</span><br>
                        ${links.map(l => `<span style="font-size:12px;">└ [ ] ${l.name}</span>`).join('<br>')}
                    </div>`;
                }
            }

            display.innerHTML = `
                <div class="tag-card">
                    <div class="tag-series mono">OPTIMAL_PICK</div>
                    <div class="mono" style="font-size:22px; margin:10px 0;">${best.name}</div>
                    <div class="mono" style="font-size:12px; color:#666;">B_DATE: ${best.buyDate}</div>
                    ${linked}
                    <button class="btn mono" style="width:100%; margin-top:15px; background:blue;" onclick="quickUse(${best.id})">PICKUP_AND_USE</button>
                </div>
            `;
        }
    }

    function quickUse(id) {
        const i = db.find(x => x.id === id);
        i.status = '使用中';
        save(); refresh(); getRecommendation();
    }

    // --- 基礎功能 ---
    function renderVault() {
        const active = db.filter(i => i.status !== '已用完').sort((a,b) => new Date(b.id) - new Date(a.id));
        document.getElementById('vault-list').innerHTML = active.map(i => `
            <div class="list-row">
                <div style="flex:1">
                    <div class="mono" style="font-size:11px; color:#999;">${i.barcode || '#NO_CODE'}</div>
                    <div style="font-weight:bold;">${i.name}</div>
                    <div style="font-size:10px; color:#666;">${i.tags} | ${i.buyDate}</div>
                </div>
                <button class="btn mono" style="font-size:10px; padding:5px;" onclick="markDone(${i.id})">DONE</button>
            </div>
        `).join('');
    }

    function renderArchive() {
        const done = db.filter(i => i.status === '已用完');
        document.getElementById('archive-list').innerHTML = done.map(i => `<div class="mono" style="font-size:11px; color:#ccc; margin-bottom:5px;">[COMPLETED] ${i.name}</div>`).join('');
    }

    function markDone(id) { db.find(x => x.id === id).status = '已用完'; save(); refresh(); }
    function save() { localStorage.setItem('retail_inv_final', JSON.stringify(db)); }
    function exportData() { document.getElementById('io-box').value = JSON.stringify(db); alert('BACKUP_READY'); }
    function importData() { try { db = JSON.parse(document.getElementById('io-box').value); save(); refresh(); alert('SUCCESS'); } catch(e) { alert('ERR'); } }

    window.onload = refresh;
</script>
</body>
</html>
