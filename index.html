<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <title>🗂️FILE</title>
    <style>
        /* --- 1. 核心系統規範與重置 --- */
        :root { 
            --sys-bg: #ffffff; 
            --sys-font: "Courier New", monospace; 
            --sys-accent: #00ff00;
            --sys-border: #000000;
            --text-grey: #aaaaaa;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--sys-bg); 
            margin: 0; 
            padding-bottom: 90px; 
            color: #000; 
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        /* 強調字體類別 */
       .mono { 
            /* 只有數字、編號、或是標籤才用等寬字體 */
            font-family: "SF Mono", "Roboto Mono", Menlo, monospace; 
            font-weight: 700;
        }

        /* --- 2. 頁面佈局組件 --- */
        .page { 
            display: none; 
            padding: 25px 20px; 
            max-width: 600px; 
            margin: auto; 
        }

        /* 確保 active 狀態具有最高優先權 */
        .page.active { display: block !important; }

        /* 統一標題樣式 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid #000;
            margin-bottom: 30px;
            padding-bottom: 10px;
            height: 50px; 
        }

        .page-header h2 { 
            margin: 0; 
            font-size: 24px; 
            font-family: var(--sys-font); /* 確保標題也是工業字體 */
            font-weight: 900;
        }

        /* 1. 全域阻斷 iOS 對 Select 文字的強制著色 */
        select {
            color: #000000 !important;
            -webkit-text-fill-color: #000000 !important; /* 關鍵：強制填滿黑色 */
            opacity: 1; /* 防止 iOS 讓 disabled 狀態變灰 */
        }

        /* 2. 針對搜尋頁推薦區的選單強化 */
        #page-search select {
            color: #000000 !important;
            -webkit-appearance: none; /* 移除 iOS 預設樣式 */
            border-radius: 0;
            background-color: #fff;
        }

        /* 3. 確保預設選項（Placeholder）也是黑色的 */
        select option {
            color: #000000;
        }

        /* --- 3. 全域工業風輸入框 (給 SEARCH/SYSTEM 頁面使用) --- */
        /* 這裡維持原本的有框設計，確保外層頁面不跑樣 */
        input, select, textarea { 
            width: 100%; 
            border: 2px solid var(--sys-border); 
            padding: 10px 8px; 
            font-size: 14px; 
            background-color: #ffffff; 
            height: 44px; 
            font-family: var(--sys-font); 
            font-weight: 900;
            border-radius: 0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        /* --- 4. 底部導覽列 NAVIGATION --- */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            background: #000; 
            height: 65px; 
            z-index: 999; 
        }

        .nav-btn { 
            flex: 1; 
            color: #666; /* 這裡移除 !important，靠選取器優先級 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            cursor: pointer; 
            border: none; 
            background: none; 
            font-family: 'Impact', sans-serif; 
            letter-spacing: 1px; 
        }

        .nav-btn.active { 
            color: #fff; 
            border-top: 4px solid var(--sys-accent); 
        }

        /* --- 5. 工業風容器 SHELF_CONTAINER --- */
        .shelf-container { 
            border: 2px solid var(--sys-border); 
            margin-bottom: 25px; 
            position: relative; 
            background: #fff; 
            box-shadow: 6px 6px 0px #e0e0e0; /* 統一使用輕工業淺灰投影 */
            padding: 20px 18px 12px 18px; 
        }

        /* 黑色膠帶感標籤 */
        .shelf-label { 
            position: absolute; 
            top: -12px; 
            left: 12px; 
            background: #000; 
            color: #fff !important; 
            -webkit-text-fill-color: #ffffff !important;
            font-family: 'Impact', sans-serif; 
            font-size: 14px; 
            padding: 2px 12px; 
            letter-spacing: 1px;
            z-index: 10;
        }

        /* 清單項目列 */
        .item-line { 
            border-bottom: 1px solid #f0f0f0; 
            padding: 12px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .item-line:last-child { border-bottom: none; } /* 最後一項移除底線 */

        /* --- 6. 按鈕系統 BUTTON_SYSTEM --- */
        /* 基礎小按鈕 */
        .btn-sm { 
            padding: 6px 12px; 
            font-size: 11px; 
            border: 1px solid var(--sys-border); 
            background: #fff; 
            cursor: pointer; 
            font-family: var(--sys-font); 
            font-weight: 900;
            transition: all 0.1s;
        }

        .btn-sm:active {
            background: #000 !important;
            color: #fff !important;
        }

        /* 危險/清除按鈕 (帶有脈衝動畫) */
        .btn-danger {
            background: #ff0000; 
            color: #fff; 
            border: 2px solid var(--sys-border);
            font-family: var(--sys-font); 
            font-weight: 900; 
            cursor: pointer;
            box-shadow: 2px 2px 0px #000; 
            padding: 4px 12px;
        }

        .btn-danger:active { transform: translate(1px, 1px); box-shadow: none; }

        /* 系統頁專用的鏈接感按鈕 */
        .btn-system-action {
            flex: 1;
            background: transparent;
            border: 1px solid #000;
            padding: 12px;
            font-family: var(--sys-font);
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1px;
            color: #000;
            text-align: center;
            cursor: pointer;
        }

        .btn-system-action:hover { background: #000; color: #fff; }

        /* --- 7. 特殊顯示區塊 --- */
        #archive-list {
            background: #000; 
            color: var(--sys-accent); 
            padding: 18px; 
            border: 2px solid #000; 
            font-size: 11px; 
            line-height: 1.8;
            min-height: 100px;
        }
        
  /* --- 8. 彈出視窗核心 (MUJI STYLE) --- */
        #entry-overlay {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 92%; 
            max-height: 85vh;
            z-index: 2000; 
            padding: 30px; 
            background: #F8F8F5; /* 輕盈米色 */
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); /* 懸浮感大陰影 */
        }

        /* 視窗內的排版 */
        #entry-overlay .form-row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        #entry-overlay .form-group { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 0;
        }

        #entry-overlay label { 
            font-size: 9px; 
            font-weight: 900; 
            color: #999; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* --- 9. 視窗內專屬：極簡底線輸入框 --- */
        #entry-overlay input, 
        #entry-overlay select {
            width: 100%;
            border: none !important; 
            border-bottom: 1px solid #e0e0e0 !important; 
            padding: 12px 0px !important; 
            font-size: 16px; 
            font-family: var(--sys-font);
            font-weight: 500; 
            color: #333 !important;
            background-color: transparent !important; 
            border-radius: 0;
            box-shadow: none !important;
            transition: all 0.3s ease;
            -webkit-text-fill-color: #000000 !important;
        }

        #entry-overlay input:focus, 
        #entry-overlay select:focus {
            border-bottom: 1px solid #000 !important;
            padding-left: 5px !important;
        }

        /* --- 10. 條碼風格儲存按鈕 (THE PROTOCOL) --- */
        .btn-save-protocol {
            all: unset;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 75%; 
            height: 75px; 
            margin: 40px auto 10px auto; 
            background: repeating-linear-gradient(
                90deg, #ddd, #ddd 1px, transparent 1px, transparent 6px,
                #bbb 6px, #bbb 7px, transparent 7px, transparent 10px
            );
            position: relative;
            transition: all 0.2s ease;
        }

        .btn-save-protocol span {
            background: #fff;
            padding: 12px 28px;
            font-family: var(--sys-font);
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 4px;
            color: #000;
            border: 2px solid #000;
            z-index: 2;
            white-space: nowrap;
        }

        .btn-save-protocol:active {
            background: repeating-linear-gradient(
                90deg, #000, #000 1px, transparent 1px, transparent 6px,
                #444 6px, #444 7px, transparent 7px, transparent 10px
            );
        }

        .btn-save-protocol:active span {
            background: #000;
            color: #fff;
            transform: translate(2px, 2px);
        }

        .btn-save-protocol::after {
            content: "V E R I F I E D _ L O G";
            position: absolute;
            bottom: -5px;
            font-size: 7px;
            letter-spacing: 3px;
            color: #ccc;
            font-family: var(--sys-font);
        }

        /* --- 11. 手機端響應式微調 (RWD) --- */
        @media (max-width: 480px) {
            #entry-overlay .form-row { 
                flex-wrap: nowrap !important; /* 強制不換行 */
            }
            #entry-overlay label {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }

    </style>
</head>
<body>

<div id="page-search" class="page active">
    <div class="page-header">
        <h2 class="mono">01_SEARCH</h2>
    </div>
    
    <div class="shelf-container">
        <div class="shelf-label">DATABASE_QUERY</div>
        <div style="margin-top: 10px;">
            <input type="text" id="check-input" placeholder="INPUT_KEYWORDS..." oninput="doCheck()">
            <div id="check-result" class="mono" style="font-size: 12px; margin-top: 10px; min-height: 18px;"></div>
        </div>
    </div>

    <div class="shelf-container">
    <div class="shelf-label">AUTO_RECOMMEND</div>
    <div style="margin-top: 10px;">
        <div class="form-row" style="margin-bottom: 15px; display: flex; gap: 10px;">
            <select id="pick-cat" onchange="updatePickSub()" style="flex: 1;"></select>
            <select id="pick-sub" onchange="getRecommended()" disabled style="flex: 1;"><option value="">-----</option></select>
        </div>
        <div id="recommend-area"></div>
    </div>
</div>
</div>

<div id="page-vault" class="page">
    <div class="page-header">
        <h2 class="mono">02_VAULT</h2>
        <button class="btn-sm mono" style="background:#000; color:#fff;" onclick="openEntry()">[+] ADD_ITEM</button>
    </div>
    <div id="vault-shelves-container"></div>
</div>

<div id="page-sys" class="page">
    <div class="page-header">
        <h2 class="mono">03_SYSTEM</h2>
    </div>

    <div class="shelf-container" style="background: #fdfdfb; border-style: dashed;">
        <div class="shelf-label">CAT_PROTOCOL</div>
        <div style="margin-top: 10px;">
            <label class="mono" style="font-size: 9px; color: #888;">GLOBAL_CATEGORY_LIST</label>
            <input type="text" id="cfg-cats" onchange="saveCfg()" style="background:#f4f4f4; margin-top: 5px;">
        </div>
    </div>

    <div class="shelf-container" style="background: #fdfdfb; border-style: dashed;">
        <div class="shelf-label">SUB_CAT_PROTOCOL</div>
        <div style="margin-top: 10px;">
            <label class="mono" style="font-size: 9px; color: #888;">GLOBAL_SUB_LIST</label>
            <textarea id="cfg-sub-cats" onchange="saveCfg()" style="width:100%; height:80px; background:#f4f4f4; margin-top: 5px; border:2px solid #000; padding:8px; font-family:var(--sys-font); font-size:12px;"></textarea>
            <div class="mono" style="font-size: 8px; color: #ccc; margin-top: 5px; letter-spacing: 1px;">
                * MANUAL_OVERRIDE: 刪除此處文字即可從下拉選單移除
            </div>
        </div>
    </div>

    <div class="shelf-container" style="background: #fdfdfb; border-style: dashed;">
        <div class="shelf-label">SYSTEM_DATA_MANAGEMENT</div>
        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button onclick="exportDataToFile()" class="btn-system-action">[EXPORT_DATABASE]</button>
            <label for="import-file" class="btn-system-action" style="cursor: pointer; text-align: center;">[IMPORT_PROTOCOL]</label>
            <input type="file" id="import-file" style="display: none;" onchange="importDataFromFile(event)">
        </div>
        
        <div style="font-size: 8px; color: #aaa; margin-top: 12px; letter-spacing: 1px;">
            NOTICE: LARGE_DATA_VOLUME_SUPPORTED (.JSON)
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div class="mono" style="font-size: 13px;">> ARCHIVE_LOG</div>
        <button class="btn-danger" onclick="clearArchive()" style="padding: 4px 12px; font-size: 10px;">PURGE_SYSTEM</button>
    </div>
    <div id="archive-list"></div>
</div>

<div id="entry-overlay">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px; border-bottom: 6px solid #000; padding-bottom: 10px;">
        <h2 class="mono" id="form-title" style="margin:0; font-size: 22px;">NEW_ENTRY_LOG</h2>
        <div onclick="closeEntry()" style="cursor:pointer; font-weight:900; background:#000; color:#fff; padding:4px 12px; font-size:12px; border: 2px solid #000;">CLOSE_[X]</div>
    </div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
        <div class="form-group"><label>CATEGORY</label><select id="in-cat" onchange="updateInSubOptions()"></select></div>
        <div class="form-group"><label>SUB_CAT</label><select id="in-sub"><option value="未分類">----</option></select></div>
        <div class="form-group"><label>STATUS</label><select id="in-status"><option value="庫存">STOCK</option><option value="使用中">USING</option></select></div>
    </div>
    <div class="form-row">
        <div class="form-group" style="flex:2;"><label>PRODUCT_NAME</label><input type="text" id="in-name"></div>
        <div class="form-group" style="flex:1;"><label>QTY</label><input type="number" id="in-qty" value="1" min="1" inputmode="numeric"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>BUY_DATE</label><input type="text" id="in-buy" placeholder="YYYYMMDD" inputmode="numeric"></div>
        <div class="form-group"><label>EXPIRY_DATE</label><input type="text" id="in-exp" placeholder="YYYYMMDD" inputmode="numeric"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>BARCODE</label><input type="text" id="in-bar"></div>
        <div class="form-group"><label>TAGS</label><input type="text" id="in-tag"></div>
    </div>
    <div style="display: flex; justify-content: center; width: 100%;">
        <button class="btn-save-protocol" onclick="saveEntry()">
            <span>SAVE_AND_PRINT</span>
        </button>
    </div>
</div>

<nav class="nav">
    <div class="nav-btn active" onclick="tab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="tab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="tab('page-sys', this)">SYSTEM</div>
</nav>

<script>
// 建議直接這樣寫，全域通用
    const STORE_DB = 'sss_db'; 
    const STORE_CFG = 'sss_cfg';

    let db = JSON.parse(localStorage.getItem(STORE_DB) || '[]');
    let cfg = JSON.parse(localStorage.getItem(STORE_CFG) || '{"cats":"...","subCats":"..."}');

    // --- 2. 整合後的子分類生成邏輯 (唯一版本) ---
    function updateSubCatSuggestions() {
        const el = document.getElementById('in-sub');
        if (!el) return;

        // A. 基礎保底分類 + 資料庫現有分類
        const base = ["洗髮", "護髮", "沐浴", "臉部清潔", "精華液", "乳液", "58飼料"];
        const existing = [...new Set(db.map(i => i.subCat).filter(s => s))];
        
        // B. 從 SYSTEM 設定區抓取的自定義分類
        let manual = [];
        if (cfg.subCats) {
            manual = cfg.subCats.split(',').map(s => s.trim());
        }

        // C. 全部聯集去重
        const all = [...new Set([...base, ...manual, ...existing])].filter(s => s && s !== "未分類");

        el.innerHTML = `<option value="未分類">----</option>` + 
                    all.sort().map(c => `<option value="${c}">${c}</option>`).join('');
    }
    
    function save() { 
        localStorage.setItem(STORE_DB, JSON.stringify(db)); 
        localStorage.setItem(STORE_CFG, JSON.stringify(cfg)); 
    }

    function saveCfg() {
        const catInput = document.getElementById('cfg-cats');
        const subInput = document.getElementById('cfg-sub-cats');
        
        if (catInput) cfg.cats = catInput.value;
        if (subInput) cfg.subCats = subInput.value;
        
        save(); 
        refresh();
        updateSubCatSuggestions(); // 立即同步下拉選單
        console.log("PROTOCOL_CONFIG_SAVED");
    }

    function updateInSubOptions() {
    const cat = document.getElementById('in-cat').value;
    const subEl = document.getElementById('in-sub');
    if (!subEl) return;

    // 1. 從 db 找出這個大類曾經用過的子分類
    const existingSubs = [...new Set(
        db.filter(i => i.category === cat).map(i => i.subCat)
    )].filter(s => s && s !== "未分類");

    // 2. 取得系統設定 (cfg) 中的所有子分類作為備選
    let cfgSubs = [];
    if (cfg.subCats) {
        cfgSubs = cfg.subCats.split(',').map(s => s.trim());
    }

    // 3. 智慧交集：如果該子分類在 db 中屬於這個大類，或者是完全沒被用過的新分類
    // 這裡我們簡化邏輯：優先顯示該大類下「已存在」的子類
    const finalOptions = existingSubs.length > 0 ? existingSubs : cfgSubs;

    subEl.innerHTML = `<option value="未分類">----</option>` + 
        finalOptions.sort().map(s => `<option value="${s}">${s}</option>`).join('');
    
}    

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active'); 

        // 如果切換到系統頁面，填入對應的設定值
        if (id === 'page-sys') {
            document.getElementById('cfg-cats').value = cfg.cats || "";
            const subInput = document.getElementById('cfg-sub-cats');
            if (subInput) subInput.value = cfg.subCats || "";
        }
        refresh(); 
    }

    function openEntry() {
        // 1. 先顯示遮罩
        const overlay = document.getElementById('entry-overlay');
        if (overlay) overlay.style.display = 'block';
        
        document.getElementById('form-title').innerText = 'NEW_ENTRY_LOG';
        document.getElementById('edit-id').value = '';

        // 2. 處理分類 (Category)
        const inCat = document.getElementById('in-cat');
        if (inCat && cfg.cats) {
            inCat.innerHTML = cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
            // 執行連動
            updateInSubOptions();
        }

        // 3. 設定預設日期與數量
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('in-buy').value = `${y}${m}${d}`;
        document.getElementById('in-qty').value = 1; 
        document.getElementById('in-qty').disabled = false;

        // 4. 清空輸入框 (排除 select 物件)
        // 我們把 in-sub 拿掉，改單獨處理
        ['in-name','in-tag','in-exp','in-bar'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });

        // 5. 更新子分類下拉選單
        updateSubCatSuggestions();

        // 6. 強制將子分類歸位到第一個選項
        const inSub = document.getElementById('in-sub');
        if (inSub) inSub.selectedIndex = 0;

        formatDateElement('in-buy');
    }


    function autoFormatDate(inputVal) {
        let val = inputVal.replace(/\D/g, ''); // 只留數字
        if (val.length === 8) {
            return val.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
        }
        return inputVal; // 如果長度不對，就回傳原值
    }   

    function saveEntry() {
        const eid = document.getElementById('edit-id').value;
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const baseName = document.getElementById('in-name').value;
        if(!baseName) return alert("MISSING_NAME");
        const newItem = {
            id: String(Date.now()), // 關鍵：強制轉為字串
            name: baseName,
            // ... 其他欄位
        };
        // --- 核心改動：日期格式化邏輯 ---
        const toStandardDate = (val) => {
            let clean = val.replace(/\D/g, ''); // 移除所有非數字
            if (clean.length === 8) {
                return `${clean.substring(0, 4)}-${clean.substring(4, 6)}-${clean.substring(6, 8)}`;
            }
            return val; // 如果不是8碼（可能已經是 YYYY-MM-DD），就維持原樣
        };
        const data = {
        category: document.getElementById('in-cat').value,
        subCat: document.getElementById('in-sub').value || "未分類",
        tags: document.getElementById('in-tag').value,
        // 儲存前強制格式化
        buyDate: toStandardDate(document.getElementById('in-buy').value),
        expiry: toStandardDate(document.getElementById('in-exp').value),
        barcode: document.getElementById('in-bar').value,
        status: document.getElementById('in-status').value
    };

    if(eid) {
        const idx = db.findIndex(x => x.id == eid);
        if(idx !== -1) db[idx] = { ...db[idx], ...data, name: baseName };
    } else {
        for(let i=0; i<qty; i++) {
            const newName = qty > 1 ? `${baseName} (${i+1}/${qty})` : baseName;
            // 確保新生成的 ID 也是字串格式，方便後續比對
            db.push({ id: String(Date.now() + i), name: newName, ...data });
        }
    }
    save(); closeEntry(); refresh();
}

    function closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; }

    function editItem(id) {
    // 1. 使用 == 避免型別錯誤 (字串 vs 數字)
    const i = db.find(x => x.id == id); 
    if(!i) return;

    // 2. 打開視窗
    document.getElementById('entry-overlay').style.display = 'block';
    document.getElementById('form-title').innerText = 'UPDATE_ENTRY_LOG';
    
    // 3. 填入關鍵 ID
    document.getElementById('edit-id').value = i.id;

    // 4. 處理分類與連動 (這步很重要，否則子分類會跳掉)
    document.getElementById('in-cat').innerHTML = cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
    document.getElementById('in-cat').value = i.category;
    
    // 手動觸發一次子分類更新邏輯 (如果你有 updateInSub 的話)
    // 如果沒有，這裡手動補齊
    const subEl = document.getElementById('in-sub');
    subEl.value = i.subCat;

    // 5. 填寫剩餘欄位
    document.getElementById('in-name').value = i.name;
    document.getElementById('in-tag').value = i.tags || '';
    document.getElementById('in-buy').value = i.buyDate || '';
    document.getElementById('in-exp').value = i.expiry || '';
    document.getElementById('in-bar').value = i.barcode || '';
    document.getElementById('in-status').value = i.status;
    
    // 6. 鎖定數量
    document.getElementById('in-qty').value = 1;
    document.getElementById('in-qty').disabled = true;
}

    function deleteItem(id) {
        // 增加一個 console log 幫助你抓蟲，如果按下沒反應，看控制台 (F12) 這裡有沒有印出來
        console.log("正在刪除 ID:", id);

        if(confirm("CONFIRM_PERMANENT_DELETION?")) {
            // 使用 != 而不是 !==，確保型別不同也能正確過濾
            db = db.filter(x => x.id != id); 
            
            save();    // 儲存回 localStorage
            refresh(); // 重新渲染畫面
        }
    }

    function finishItem(id) {
        if(confirm("MARK AS FINISHED?")) {
            const i = db.find(x => x.id === id);
            if(i) { i.status = '已用完'; i.finishDate = new Date().toISOString().split('T')[0]; save(); refresh(); }
        }
    }

    function useItem(id) {
        // 1. 使用 == 確保匹配字串或數字 ID
        const i = db.find(x => x.id == id);
        if (!i) return;

        // 2. 執行開啟邏輯
        i.status = '使用中';
        i.openDate = new Date().toISOString().split('T')[0];
        save();
        refresh();

        // 3. 聯動提醒邏輯：針對頭髮產品
        // 假設你的分類名稱包含「頭髮」或「洗髮」
        if (i.category.includes('頭髮') || i.subCat.includes('洗髮')) {
            
            // 搜尋同分類下，還在「庫存」的護髮產品
            const related = db.filter(item => 
                item.id != id && 
                item.status === '庫存' && 
                (item.subCat.includes('護髮') || item.subCat.includes('潤髮') || item.subCat.includes('髮膜'))
            );

            if (related.length > 0) {
                // 找出最適合搭配的（優先找名稱裡有相似關鍵字的，例如同系列名）
                const suggestions = related.map(r => `• ${r.name}`).join('\n');
                
                // 使用工業風的提醒視窗
                setTimeout(() => {
                    alert(`[ PROTOCOL_REMINDER ]\n\n偵測到您開啟了洗髮產品。\n庫存中還有相關配套：\n${suggestions}\n\n建議同步取出使用以達最佳效果。`);
                }, 300);
            }
        }
    }

    function setupDateAutoFormat(elementId) {   
    const el = document.getElementById(elementId);
    el.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 8) val = val.slice(0, 8);
        
        // 當使用者輸入滿 8 碼時，即時顯示橫線給他們看
        if (val.length === 8) {
            e.target.value = `${val.substring(0, 4)}-${val.substring(4, 6)}-${val.substring(6, 8)}`;
        }
    });
}

    function doCheck() {
    const q = document.getElementById('check-input').value.trim().toLowerCase();
    const res = document.getElementById('check-result');
    if(!q) { res.innerHTML = ""; return; }
    
    // 1. 核心過濾：找出未用完的項目
    const activeItems = db.filter(i => i.status !== '已用完');

    // 2. 第一層搜尋：精確匹配名稱、條碼、標籤
    let matches = activeItems.filter(i => {
        const s = (field) => (i[field] || "").toLowerCase();
        return s('name').includes(q) || s('barcode').includes(q) || s('tags').includes(q) || s('subCat').includes(q);
    });

    let isDiscoveryMode = false;

    // 3. 第二層搜尋：如果第一層沒中，嘗試「分類聯想」
    if (matches.length === 0) {
        matches = activeItems.filter(i => {
            const s = (field) => (i[field] || "").toLowerCase();
            return s('subCat').includes(q) || s('category').includes(q);
        });
        if (matches.length > 0) isDiscoveryMode = true;
    }

    // 4. 完全沒找到
    if (matches.length === 0) {
        res.innerHTML = `<div style="color:#ff0000; padding:15px; border:1px dashed #000; margin-top:10px; font-size:10px; background:#fff;">[ STATUS: NO_MATCH_FOUND_IN_VAULT ]</div>`;
        return;
    }

    const vCount = matches.filter(i => i.status === '庫存').length;
    const uCount = matches.filter(i => i.status === '使用中').length;
    
    // 5. 渲染看板 (根據是否為聯想模式切換顏色)
    const boardBg = isDiscoveryMode ? '#ff9800' : '#000'; // 聯想模式用橘色提醒
    const boardTitle = isDiscoveryMode ? 'CATEGORY_MATCHED' : 'DATABASE_CHECK';
    const mainCountLabel = isDiscoveryMode ? `SIMILAR: ${matches.length}` : `MATCHED: ${matches.length}`;

    res.innerHTML = `
        <div style="background:${boardBg}; color:${isDiscoveryMode ? '#000' : '#fff'}; padding:15px; margin:10px 0 20px 0; display:flex; justify-content:space-between; align-items:center; box-shadow: 6px 6px 0px #eee;">
            <div class="mono" style="line-height:1;">
                <div style="font-size: 10px; opacity: 0.6; margin-bottom: 5px;">${boardTitle}</div>
                <div style="font-size: 28px; font-weight: 900; letter-spacing: -1px;">
                    ${mainCountLabel}
                </div>
            </div>
            <div class="mono" style="text-align:right; font-size: 10px; opacity: 0.8;">
                STOCK: ${vCount}<br>USING: ${uCount}
            </div>
        </div>
        
        ${isDiscoveryMode ? `<div class="mono" style="font-size:10px; color:#ff9800; font-weight:bold; margin-bottom:10px;">> 找不到精確名稱，以下是相關類別的庫存：</div>` : ''}

        <div style="max-height: 400px; overflow-y: auto;">
            ${matches.map(i => {
                // 自動效期推算
                let finalExp = i.expiry || (i.buyDate ? `${parseInt(i.buyDate.split('-')[0]) + 3}-${i.buyDate.split('-')[1]}-${i.buyDate.split('-')[2]}` : "--");
                const isUsing = i.status === '使用中';
                
                return `
                <div style="border-bottom: 1.5px solid #000; padding: 12px 0; display: flex; align-items: flex-start; gap: 10px; opacity: ${isUsing ? '0.6' : '1'};">
                    <div style="flex: 1; min-width: 0;">
                        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">
                            <span class="mono" style="font-size: 9px; border: 1px solid #ccc; color: #888; padding: 0 3px;">${i.subCat}</span>
                            ${i.tags ? `<span class="mono" style="font-size: 9px; color: #000; font-weight:900;">#${i.tags.split(',')[0]}</span>` : ''}
                        </div>
                        
                        <div class="mono" style="font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${i.name}
                        </div>
                        
                        <div class="mono" style="font-size: 10px; color: #999; margin-top: 4px;">
                            EXP: ${finalExp} ${isUsing ? ' (IN_USE)' : ''}
                        </div>
                    </div>

                    <div style="display: flex; gap: 8px; align-items: center; padding-top: 15px;">
                        <span onclick="editItem('${i.id}')" style="font-size: 10px; font-weight: 700; color: #0208c4; text-decoration: underline; cursor: pointer;">EDIT</span>
                        ${!isUsing ? `<button onclick="useItem('${i.id}'); doCheck();" class="btn-sm" style="background:#000; color:#fff; border:none; padding: 4px 10px; font-size: 10px;">OPEN</button>` : ''}
                    </div>
                </div>`;
            }).join('')}
        </div>
        <div class="mono" style="text-align: center; font-size: 9px; color: #eee; margin-top: 20px; letter-spacing: 2px;">PROTOCOL_EOF</div>
    `;
}

    function updatePickSub() {
    const cat = document.getElementById('pick-cat').value;
    const subS = document.getElementById('pick-sub');
    if (!subS) return;

    // A. 從資料庫 (db) 找出該大類下「現有」的子分類
    const existingSubs = [...new Set(
        db.filter(i => i.category === cat && i.status === '庫存')
          .map(i => i.subCat)
    )];

    // B. 從設定 (cfg) 找出原本預定義的子分類 (作為補完)
    // 雖然不一定每個都有庫存，但讓使用者能選也是對的
    let definedSubs = [];
    if (cfg.subCats) {
        definedSubs = cfg.subCats.split(',').map(s => s.trim());
    }

    // C. 合併並過濾 (只顯示該大類下真的有的，或者設定中有的)
    // 這裡我們採取「實務導向」：既然是要推薦「開來用」，就只顯示「目前有庫存」的子分類
    const finalOptions = existingSubs.filter(s => s && s !== "未分類");

    if (finalOptions.length === 0) {
        subS.innerHTML = '<option value="">-- 無庫存子類 --</option>';
        subS.disabled = true;
    } else {
        subS.innerHTML = '<option value="">-- 全部子項目 --</option>' + 
            finalOptions.sort().map(s => `<option value="${s}">${s}</option>`).join('');
        subS.disabled = false;
    }
    
    // 每當大類切換，自動觸發一次推薦
    getRecommended();
}

    function getRecommended() {
    const cat = document.getElementById('pick-cat').value;
    const sub = document.getElementById('pick-sub').value;
    const area = document.getElementById('recommend-area');
    
    // 取得搜尋框內容，用來支援「我想用美白」這種特定需求
    const searchTag = document.getElementById('check-input')?.value.trim().toLowerCase() || "";

    if (!cat) {
        area.innerHTML = `<div class="mono" style="padding:20px; text-align:center; color:#888;">[ SELECT_CATEGORY_TO_START_PROTOCOL ]</div>`;
        return;
    }

    let items = db.filter(i => i.status === '庫存' && i.category === cat);
    if (sub) items = items.filter(i => i.subCat === sub);
    
    // 如果有輸入關鍵字（如美白），優先篩選
    if (searchTag) {
        items = items.filter(i => 
            (i.name || "").toLowerCase().includes(searchTag) || 
            (i.tags || "").toLowerCase().includes(searchTag)
        );
    }

    // 效期排序
    items.sort((a, b) => {
        const getExp = (item) => {
            if (item.expiry) return item.expiry;
            if (item.buyDate && item.buyDate.includes('-')) {
                const p = item.buyDate.split('-');
                return `${parseInt(p[0]) + 3}-${p[1]}-${p[2]}`;
            }
            return "9999-12-31";
        };
        return getExp(a).localeCompare(getExp(b));
    });

    const top3 = items.slice(0, 3);
    const labelColors = ['#ff4d4d', '#ffa64d', '#ffdb4d']; // 恢復原本的紅、橘、黃標籤色

    area.innerHTML = top3.length ? top3.map((i, idx) => {
        let finalExp = i.expiry;
        let isAutoExp = false;

        if (!finalExp || finalExp.trim() === "") {
            isAutoExp = true;
            if (i.buyDate) {
                const parts = i.buyDate.split('-');
                finalExp = `${parseInt(parts[0]) + 3}-${parts[1]}-${parts[2]}`;
            } else { finalExp = "UNKNOWN"; }
        }

        return `
        <div style="border: 2px solid #000; margin: 25px 0; padding: 18px; position: relative; background: #fff; box-shadow: 6px 6px 0px #eee;">
            <div class="mono" style="position: absolute; top: -12px; left: 12px; background: ${labelColors[idx] || '#ccc'}; color: #000; font-size: 11px; padding: 3px 10px; font-weight: 900; border: 1px solid #000;">
                PICK_0${idx+1} ${isAutoExp ? '[ESTIMATED]' : ''}
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span class="mono" style="font-size: 10px; border: 1px solid #ccc; padding: 1px 4px; color: #666; background: #f4f4f4;">${i.subCat}</span>
                    <span class="mono" style="font-size: 15px; font-weight:900; margin-left: 8px;">${i.name}</span>
                    <div class="mono" style="font-size: 10px; color: ${isAutoExp ? '#ff9800' : '#aaa'}; margin-top: 6px; font-weight: bold;">
                        > EXP: ${finalExp} ${isAutoExp ? '(*)' : ''}
                    </div>
                </div>
                <button onclick="quickUse('${i.id}')" class="btn-sm" style="background:#000; color:#fff; border:none; padding: 8px 16px; font-weight:900; cursor:pointer;">OPEN</button>
            </div>
        </div>`;
    }).join('') : `<div class="mono" style="padding:30px; text-align:center; color:#aaa; border:1px dashed #aaa;">[ DATABASE_QUERY_EMPTY ]</div>`;
}

    function quickUse(id) { useItem(id); getRecommended(); }
    function saveCfg() { cfg.cats = document.getElementById('cfg-cats').value; save(); refresh(); }
    
    // --- [備份] 匯出檔案 (對齊 retail_v52 版本) ---
    function exportDataToFile() {
        // 直接使用變數 db，並確保它有內容
        if (!db || db.length === 0) {
            alert("ERROR: DATABASE_IS_EMPTY");
            return;
        }
        
        // 包裝完整備份：包含資料 (db) 與 配置 (cfg)
        const backupData = {
            version: "RETAIL_V52",
            timestamp: new Date().toISOString(),
            db: db,   // 這裡直接引用你的全域變數 db
            cfg: cfg  // 同時備份你的分類配置
        };

        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
        a.href = url;
        a.download = `RT_backup_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 0);
    }

    // --- [還原] 匯入檔案 ---
    function importDataFromFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                
                // 檢查是否為有效的備份結構
                const importedDb = json.db || (Array.isArray(json) ? json : null);
                
                if (!importedDb) {
                    throw new Error("INVALID_FORMAT");
                }

                if (confirm(`DETECTED: ${importedDb.length} RECORDS. OVERWRITE CURRENT DATABASE?`)) {
                    // 更新全域變數
                    db = importedDb;
                    
                    // 如果檔案包含配置，同步還原
                    if (json.cfg) {
                        cfg = json.cfg;
                    }

                    // 執行存檔與刷新
                    save(); 
                    refresh();
                    
                    alert("PROTOCOL_RESTORE_SUCCESS");
                    location.reload(); 
                }
            } catch (err) {
                alert("CRITICAL_ERROR: FILE_CORRUPTED_OR_INVALID");
                console.error(err);
            }
        };
        reader.readAsText(file);
        event.target.value = ''; // 重置以支援重複選取同一檔案
    }


    window.onload = () => { 
    setupDateAutoFormat('in-buy'); 
    setupDateAutoFormat('in-exp'); 
    
    // 初始化時，確保搜尋框是空的
    if(document.getElementById('check-input')) {
        document.getElementById('check-input').value = '';
    }
    
    refresh(); 
};

</script>
