<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <title>RETAIL_V52_FIXED</title>
    <style>
        /* --- 核心系統規範與重置 --- */
        :root { 
            --sys-bg: #ffffff; 
            --sys-font: "Courier New", monospace; 
            --sys-accent: #00ff00;
            --sys-border: #000000;
            --text-grey: #aaaaaa;
            --text-active-using: #fff9c4;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--sys-bg); 
            margin: 0; 
            padding-bottom: 90px; 
            color: #000; 
            overflow-x: hidden;
            font-family: var(--sys-font);
            -webkit-font-smoothing: antialiased; /* 手機字體更清晰 */
        }

        .mono { font-family: var(--sys-font); font-weight: 900; }

        /* --- 佈局組件 --- */
        .page { display: none; padding: 25px 20px; max-width: 600px; margin: auto; }
        .page.active { display: block !important; }

        /* 統一標題樣式，解決問題 1 的高低不一 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid #000;
            margin-bottom: 30px;
            padding-bottom: 10px;
            height: 50px; /* 固定高度確保切換時視覺不跳動 */
        }
        .page-header h2 { margin: 0; font-size: 24px; }

        /* --- 統一輸入框樣式 --- */
        input, select, textarea { 
            width: 100%; 
            border: 2px solid var(--sys-border); 
            padding: 10px 8px; 
            font-size: 14px; 
            outline: none; 
            border-radius: 0; 
            background-color: #ffffff !important; 
            height: 44px; 
            appearance: none; 
            -webkit-appearance: none;
            font-family: var(--sys-font); 
            font-weight: 900;
            color: #000000 !important;
            -webkit-text-fill-color: #000000 !important;
            opacity: 1 !important;
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        input:focus, select:focus { 
            background-color: rgba(0,0,0,0.05) !important; /* 淡淡的灰底，或是維持 transparent */
            color: #000 !important; 
            -webkit-text-fill-color: #000000 !important; /* 確保輸入中文字是黑色的 */
        }

        /* --- 導覽列 NAVIGATION --- */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; height: 65px; z-index: 999; }
        .nav-btn { flex: 1; color: #666 !important; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: none; background: none; font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        .nav-btn.active { color: #fff !important; border-top: 4px solid var(--sys-accent); }

        /* 手機端專屬微調 (RWD) */
        @media (max-width: 480px) {
            #entry-overlay .form-row { flex-direction: row; flex-wrap: wrap; gap: 10px; }
            .form-group { min-width: 45%; } /* 手機上兩兩並排 */
            .form-group[style*="flex:2"] { min-width: 100%; } /* 名稱欄位強行滿版 */
            .page-header h2 { font-size: 20px; }
        }

        /* 修改投影為更銳利的工業感 */
        .shelf-container { 
            border: 2px solid var(--sys-border); 
            margin-bottom: 25px; 
            position: relative; 
            background: #fff; 
            box-shadow: 6px 6px 0px #e0e0e0; /* 淺灰色投影增加立體感但不沉重 */
            padding: 20px 18px 12px 18px; 
        }
        
        .shelf-label { 
            position: absolute; 
            top: -12px; 
            left: 12px; 
            background: #000; 
            color: #fff !important; 
            -webkit-text-fill-color: #ffffff !important;
            font-family: 'Impact'; 
            font-size: 14px; 
            padding: 2px 12px; 
            letter-spacing: 1px; 
        }
        
        .item-line { 
            border-bottom: 1px solid #f0f0f0; 
            padding: 12px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* --- 其他元件 --- */
        .btn-sm { 
            padding: 6px 12px; font-size: 11px; border: 1px solid var(--sys-border); 
            background: #fff; cursor: pointer; font-family: var(--sys-font); font-weight: 900;
        }

        .btn-sm:active {
            background: #000 !important;
            color: #fff !important;
        }
        .btn-danger {
            background: #ff0000; color: #fff; border: 2px solid var(--sys-border);
            font-family: var(--sys-font); font-weight: 900; cursor: pointer;
            box-shadow: 2px 2px 0px #000; animation: danger-pulse 2s infinite;
        }
        @keyframes danger-pulse { 0% { background:#f00; } 50% { background:#b00; } 100% { background:#f00; } }

        #archive-list {
            background: #000; color: var(--sys-accent); padding: 18px; 
            border: 2px solid #000; font-size: 11px; line-height: 1.8;
            position: relative; overflow: hidden;
        }
        
        #entry-overlay {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 92%; max-height: 85vh;
            border: 1px solid #000; box-shadow: 6px 6px 0px #383838;
            z-index: 2000; padding: 20px; background: #F8F8F5; overflow-y: auto;
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .form-group label { font-size: 10px; font-weight: 900; margin-bottom: 5px; }


        #entry-overlay input:focus, 
        #entry-overlay select:focus {
            border-bottom: 2px solid #000 !important; /* 聚焦時底線變粗就好，不要換背景色 */
            background-color: transparent !important; 
            padding-left: 5px !important; /* 稍微位移增加動態感 */
        }

        #entry-overlay .form-row { 
                display: flex; 
                gap: 15px; 
                margin-bottom: 20px; 
            }

        #entry-overlay .form-group { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            position: relative; /* 用於定位 */
        }

        #entry-overlay label { 
            font-size: 9px; 
            font-weight: 900; 
            color: #999; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }   

        /* --- 核心變更：重塑輸入框樣式 --- */
        #entry-overlay input, 
        #entry-overlay select {
            width: 100%;
            border: none !important; /* 徹底移除邊框 */
            border-bottom: 1px solid #e0e0e0 !important; /* 只留一條極細的淺灰底線 */
            padding: 12px 0px !important; /* 增加上下內距，移除左右內距，讓文字靠左對齊 */
            font-size: 16px; /* 稍微放大字體，增加可讀性 */
            font-family: var(--sys-font);
            font-weight: 500; /* 不要太粗，保持優雅 */
            color: #333 !important;
            background-color: transparent !important; /* 背景透明 */
            border-radius: 0;
            box-shadow: none !important; /* 移除任何陰影 */
            transition: all 0.3s ease; /* 平滑過渡效果 */
            -webkit-text-fill-color: #000000 !important;
        }

        /* 條碼按鈕容器：確保居中且有呼吸感 */
        .btn-save-protocol {
            all: unset;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* 縮減寬度，讓它在底部像個精緻的標籤 */
            width: 75%; 
            height: 75px; 
            margin: 40px auto 10px auto; 
            
            /* 改良版條碼漸層：增加疏密變化，更有真實感 */
            background: repeating-linear-gradient(
                90deg,
                #ddd,
                #ddd 1px,
                transparent 1px,
                transparent 6px,
                #bbb 6px,
                #bbb 7px,
                transparent 7px,
                transparent 10px
            );
            position: relative;
            transition: all 0.2s ease;
        }

        /* 文字框：大一點、從容一點 */
        .btn-save-protocol span {
            background: #fff;
            padding: 12px 28px;
            font-family: var(--sys-font);
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 4px;
            color: #000;
            border: 2px solid #000;
            z-index: 2;
            white-space: nowrap;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05); /* 極輕微的偏移感 */
        }

        /* 點擊時的動態：條碼變深、文字框產生壓感 */
        .btn-save-protocol:active {
            background: repeating-linear-gradient(
                90deg,
                #000,
                #000 1px,
                transparent 1px,
                transparent 6px,
                #444 6px,
                #444 7px,
                transparent 7px,
                transparent 10px
            );
        }

        .btn-save-protocol:active span {
            background: #000;
            color: #fff;
            transform: translate(2px, 2px); /* 模擬按鈕按下的物理感 */
            box-shadow: none;
        }

        /* 條碼下方數字 */
        .btn-save-protocol::after {
            content: "V E R I F I E D _ L O G";
            position: absolute;
            bottom: -5px;
            font-size: 7px;
            letter-spacing: 3px;
            color: #ccc;
            font-family: var(--sys-font);
        }
 
        /* --- 彈出視窗本身的樣式微調：更輕盈 --- */
        #entry-overlay {
            border: none; /* 移除外框 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); /* 使用柔和的大陰影，營造懸浮感 */
            background: #F8F8F5;
            padding: 30px;
            border-radius: 8px; /* 稍微加一點圓角 */
        }

    </style>
</head>
<body>

<div id="page-search" class="page active">
    <div class="page-header">
        <h2 class="mono">01_SEARCH</h2>
    </div>
    
    <div class="shelf-container">
        <div class="shelf-label">DATABASE_QUERY</div>
        <div style="margin-top: 10px;">
            <input type="text" id="check-input" placeholder="INPUT_KEYWORDS..." oninput="doCheck()">
            <div id="check-result" class="mono" style="font-size: 12px; margin-top: 10px; min-height: 18px;"></div>
        </div>
    </div>

    <div class="shelf-container">
        <div class="shelf-label">AUTO_RECOMMEND</div>
        <div style="margin-top: 10px;">
            <div class="form-row" style="margin-bottom: 15px;">
                <select id="pick-cat" onchange="updatePickSub()"></select>
                <select id="pick-sub" onchange="getRecommended()" disabled><option value="">-----</option></select>
            </div>
            <div id="recommend-area"></div>
        </div>
    </div>
</div>

<div id="page-vault" class="page">
    <div class="page-header">
        <h2 class="mono">02_VAULT</h2>
        <button class="btn-sm mono" style="background:#000; color:#fff;" onclick="openEntry()">[+] ADD_ITEM</button>
    </div>
    <div id="vault-shelves-container"></div>
</div>

<div id="page-sys" class="page">
    <div class="page-header">
        <h2 class="mono">03_SYSTEM</h2>
    </div>

    <div class="shelf-container">
        <div class="shelf-label">CONFIG_PROTOCOL</div>
        <input type="text" id="cfg-cats" onchange="saveCfg()" style="background:#f4f4f4; margin-top: 10px;">
    </div>

    <div class="shelf-container">
        <div class="shelf-label">DATA_BRIDGE</div>
        <textarea id="io-box" style="width:100%; height:100px; font-size:10px; margin-top:10px; background:#f4f4f4;" placeholder="LISTENING_FOR_STREAM..."></textarea>
        <div class="form-row" style="margin-top:15px;">
            <button class="btn-sm" style="flex:1; background:#000; color:#fff;" onclick="exportDB()">↑ EXPORT</button>
            <button class="btn-sm" style="flex:1;" onclick="importDB()">↓ IMPORT</button>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div class="mono" style="font-size: 13px;">> ARCHIVE_LOG</div>
        <button class="btn-danger" onclick="clearArchive()" style="padding: 4px 12px; font-size: 10px;">PURGE_SYSTEM</button>
    </div>
    <div id="archive-list"></div>
</div>

<div id="entry-overlay">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px; border-bottom: 6px solid #000; padding-bottom: 10px;">
        <h2 class="mono" id="form-title" style="margin:0; font-size: 22px;">NEW_ENTRY_LOG</h2>
        <div onclick="closeEntry()" style="cursor:pointer; font-weight:900; background:#000; color:#fff; padding:4px 12px; font-size:12px; border: 2px solid #000;">CLOSE_[X]</div>
    </div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
        <div class="form-group"><label>CATEGORY</label><select id="in-cat"></select></div>
        <div class="form-group"><label>SUB_CAT</label><input type="text" id="in-sub" placeholder="IDENTIFIER..."></div>
        <div class="form-group"><label>STATUS</label><select id="in-status"><option value="庫存">STOCK</option><option value="使用中">USING</option></select></div>

    </div>
    <div class="form-row">
        <div class="form-group" style="flex:2;"><label>PRODUCT_NAME</label><input type="text" id="in-name" placeholder="INPUT_NAME..."></div>
        <div class="form-group" style="flex:1;"><label>QTY</label><input type="number" id="in-qty" value="1" min="1"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>BUY_DATE</label><input type="text" id="in-buy" placeholder="YYYYMMDD" inputmode="numeric"></div>
        <div class="form-group"><label>EXPIRY_DATE</label><input type="text" id="in-exp" placeholder="YYYYMMDD" inputmode="numeric"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>BARCODE</label><input type="text" id="in-bar" placeholder="SCAN_OR_TYPE..."></div>
        <div class="form-group"><label>TAGS</label><input type="text" id="in-tag" placeholder="KEYWORDS..."></div>
    </div>
    <div style="display: flex; justify-content: center; width: 100%;">
        <button class="btn-save-protocol" onclick="saveEntry()">
            <span>SAVE_AND_PRINT</span>
        </button>
    </div>
</div>

<nav class="nav">
    <div class="nav-btn active" onclick="tab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="tab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="tab('page-sys', this)">SYSTEM</div>
</nav>

<script>
    // --- 邏輯部分保持不變 ---
    let db = JSON.parse(localStorage.getItem('retail_v52_db') || '[]');
    let cfg = JSON.parse(localStorage.getItem('retail_v52_cfg') || '{"cats":"護膚產品,頭髮產品,身體保養,家用清潔"}');

    function save() { 
        localStorage.setItem('retail_v52_db', JSON.stringify(db)); 
        localStorage.setItem('retail_v52_cfg', JSON.stringify(cfg)); 
    }

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active'); 
        refresh(); 
    }

    function openEntry() {
        document.getElementById('entry-overlay').style.display = 'block';
        document.getElementById('form-title').innerText = 'NEW_ENTRY_LOG';
        document.getElementById('edit-id').value = '';
        document.getElementById('in-cat').innerHTML = cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('in-buy').value = `${y}${m}${d}`;
        document.getElementById('in-qty').value = 1; 
        document.getElementById('in-qty').disabled = false;
        ['in-sub','in-name','in-tag','in-exp','in-bar'].forEach(id => document.getElementById(id).value = '');
        formatDateElement('in-buy');
    }

    function formatDateElement(id) {
        const el = document.getElementById(id);
        let val = el.value.replace(/\D/g, '');
        if (val.length === 8) {
            el.value = `${val.substring(0, 4)}-${val.substring(4, 6)}-${val.substring(6, 8)}`;
        }
    }

    function saveEntry() {
        const eid = document.getElementById('edit-id').value;
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const baseName = document.getElementById('in-name').value;
        if(!baseName) return alert("MISSING_NAME");
        const data = {
            category: document.getElementById('in-cat').value,
            subCat: document.getElementById('in-sub').value || "未分類",
            tags: document.getElementById('in-tag').value,
            buyDate: document.getElementById('in-buy').value,
            expiry: document.getElementById('in-exp').value,
            barcode: document.getElementById('in-bar').value,
            status: document.getElementById('in-status').value
        };
        if(eid) {
            const idx = db.findIndex(x => x.id == eid);
            if(idx !== -1) db[idx] = { ...db[idx], ...data, name: baseName };
        } else {
            for(let i=0; i<qty; i++) {
                const newName = qty > 1 ? `${baseName} (${i+1}/${qty})` : baseName;
                db.push({ id: Date.now() + i, name: newName, ...data });
            }
        }
        save(); closeEntry(); refresh();
    }

    function closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; }

    function editItem(id) {
        const i = db.find(x => x.id === id);
        if(!i) return;
        openEntry();
        document.getElementById('form-title').innerText = 'UPDATE_ENTRY_LOG';
        document.getElementById('edit-id').value = i.id;
        document.getElementById('in-cat').value = i.category;
        document.getElementById('in-sub').value = i.subCat;
        document.getElementById('in-name').value = i.name;
        document.getElementById('in-tag').value = i.tags || '';
        document.getElementById('in-buy').value = i.buyDate;
        document.getElementById('in-exp').value = i.expiry;
        document.getElementById('in-bar').value = i.barcode || '';
        document.getElementById('in-status').value = i.status;
        document.getElementById('in-qty').value = 1;
        document.getElementById('in-qty').disabled = true;
    }

    function deleteItem(id) {
        if(confirm("CONFIRM_PERMANENT_DELETION?")) {
            db = db.filter(x => x.id !== id);
            save(); refresh();
        }
    }

    function finishItem(id) {
        if(confirm("MARK AS FINISHED?")) {
            const i = db.find(x => x.id === id);
            if(i) { i.status = '已用完'; i.finishDate = new Date().toISOString().split('T')[0]; save(); refresh(); }
        }
    }

    function useItem(id) {
        const i = db.find(x => x.id === id);
        if(i) { i.status = '使用中'; i.openDate = new Date().toISOString().split('T')[0]; save(); refresh(); }
    }

    function setupDateAutoFormat(elementId) {
        const el = document.getElementById(elementId);
        el.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 8) val = val.slice(0, 8);
            if (val.length === 8) {
                e.target.value = `${val.substring(0, 4)}-${val.substring(4, 6)}-${val.substring(6, 8)}`;
            } else { e.target.value = val; }
        });
        el.addEventListener('blur', (e) => {
            const regex = /^\d{4}-\d{2}-\d{2}$/;
            if (e.target.value && !regex.test(e.target.value)) { alert("DATE_FORMAT_ERROR"); e.target.value = ""; }
        });
    }

    function doCheck() {
    const q = document.getElementById('check-input').value.trim().toLowerCase();
    const res = document.getElementById('check-result');
    if(!q) { res.innerHTML = ""; return; }
    
    // 優先過濾掉「已用完」的，僅搜尋現有物資
    const matches = db.filter(i => i.status !== '已用完' && (
        (i.barcode && i.barcode.includes(q)) || 
        i.name.toLowerCase().includes(q) ||
        (i.tags && i.tags.toLowerCase().includes(q)) ||
        i.subCat.toLowerCase().includes(q)
    ));

    if (matches.length === 0) {
        res.innerHTML = `<div style="color:#ff0000; padding:15px; border:1px dashed #000; margin-top:10px; font-size:10px;">[ STATUS: NO_MATCH_FOUND ]</div>`;
        return;
    }

    const vCount = matches.filter(i => i.status === '庫存').length;
    const uCount = matches.filter(i => i.status === '使用中').length;
    
    res.innerHTML = `
        <div style="background:#000; color:#fff; padding:8px 12px; margin:10px 0; font-size:11px;">MATCH_FOUND: ${matches.length} (STOCK:${vCount} / USING:${uCount})</div>
        <div style="max-height: 300px; overflow-y: auto;">
            ${matches.map(i => `
                <div style="border:1px solid #000; padding:10px; margin-bottom:8px; background:${i.status === '使用中' ? '#fff9c4' : '#fff'}">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="mono" style="font-size:13px; font-weight:900;">${i.name}</span>
                        <span class="mono" style="font-size:10px; background:#000; color:#fff; padding:0 4px;">${i.status}</span>
                    </div>
                    <div class="mono" style="font-size:9px; color:#666; margin-top: 5px;">${i.category} > ${i.subCat} | EXP: ${i.expiry || '--'}</div>
                </div>
            `).join('')}
        </div>
    `;
}

    function renderVault() {
        const container = document.getElementById('vault-shelves-container');
        const usingItems = db.filter(i => i.status === '使用中');
        const activeItems = db.filter(i => i.status === '庫存');
        const grouped = activeItems.reduce((acc, item) => {
            if (!acc[item.category]) acc[item.category] = [];
            acc[item.category].push(item);
            return acc;
        }, {});

        let usingSection = "";
        if (usingItems.length > 0) {
            usingSection = `
                <div class="shelf-container" style="background: #fff9c4;">
                    <div class="shelf-label" style="background: #000; color: #fff9c4; -webkit-text-fill-color: #fff9c4 !important;">ACTIVE_USING_LOG</div>
                    <div style="padding-top: 10px;">
                        ${usingItems.map(i => {
                            const days = i.openDate ? Math.floor((new Date() - new Date(i.openDate)) / (1000 * 60 * 60 * 24)) : 0;
                            return `
                            <div class="item-line">
                                <div style="flex: 1;">
                                    <span class="mono" style="font-size:10px; border:1px solid #000; padding:0 4px; background:#000; color:#fff;">${i.subCat}</span>
                                    <span class="mono" style="font-size:14px; margin-left:8px; font-weight:900;">${i.name}</span>
                                    <div class="mono" style="font-size:9px; color:#666; margin-top:4px;">> OPEN: ${i.openDate} (${days}D)</div>
                                </div>
                                <div style="display: flex; gap: 4px;">
                                    <button onclick="editItem(${i.id})" class="btn-sm" style="color:#0000ff !important; border-color:#0000ff !important;">EDIT</button>
                                    <button onclick="finishItem(${i.id})" class="btn-sm" style="background:#000; color:#fff;">OFF</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        let stockSection = `
            <details open style="margin-top: 20px;">
                <summary class="mono" style="text-align: center; cursor: pointer; padding: 10px; background: #eee; border: 2px solid #000; list-style: none; font-size: 12px;">▼ TOGGLE_STOCK_LIST ▼</summary>
                <div style="margin-top: 25px;">
                    ${Object.keys(grouped).map(cat => `
                        <div class="shelf-container">
                            <div class="shelf-label">${cat.toUpperCase()}</div>
                            <div style="padding-top: 10px;">
                                ${grouped[cat].map(i => `
                                    <div class="item-line">
                                        <div style="flex: 1;">
                                            <span class="mono" style="font-size:10px; border:1px solid #ccc; padding:0 4px; color:#666;">${i.subCat}</span>
                                            <span class="mono" style="font-size:14px; margin-left:8px; font-weight:900;">${i.name}</span>
                                            <div class="mono" style="font-size:9px; color:#aaaaaa; margin-top:4px;">EXP: ${i.expiry || '--'}</div>
                                        </div>
                                        <div style="display: flex; gap: 4px;">
                                            <button onclick="editItem(${i.id})" class="btn-sm" style="color:#0000ff !important; border-color:#0000ff !important;">EDIT</button>
                                            <button onclick="deleteItem(${i.id})" class="btn-sm" style="color:#ff0000 !important; border-color:#ff0000 !important;">DEL</button>
                                            <button onclick="useItem(${i.id})" class="btn-sm" style="background:#000; color:#fff;">ON</button>
                                        </div>
                                    </div>`).join('')}
                            </div>
                        </div>`).join('')}
                </div>
            </details>`;
        container.innerHTML = usingSection + stockSection;
    }

    function refresh() {
        document.getElementById('cfg-cats').value = cfg.cats;
        document.getElementById('pick-cat').innerHTML = '<option value="">-CATEGORY-</option>' + cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        renderVault();
        const archived = db.filter(i => i.status === '已用完');
        document.getElementById('archive-list').innerHTML = `
            <div style="border-bottom: 1px dashed #00ff00; padding-bottom: 5px; margin-bottom: 10px; opacity: 0.7;">TOTAL_RECORDS: ${archived.length}</div>
            ${archived.length ? archived.map(i => `
                <div style="margin-bottom: 4px;">
                    <span style="opacity: 0.5;">[${i.finishDate || '0000-00-00'}]</span> <span>${i.name}</span> <span style="color: #666; float: right;">...OK</span>
                </div>`).join('') : '<div style="color:#444;">NO_DATA_LOGGED</div>'}
            <div style="margin-top: 10px; color: #444; border-top: 1px solid #222; padding-top: 5px;">_EOF</div>`;
    }

    function clearArchive() {
        const archiveCount = db.filter(i => i.status === '已用完').length;
        if (archiveCount === 0 || !confirm(`CRITICAL: PURGE ${archiveCount} RECORDS?`)) return;
        db = db.filter(i => i.status !== '已用完'); save(); refresh();
    }

    function updatePickSub() {
        const cat = document.getElementById('pick-cat').value;
        const subS = document.getElementById('pick-sub');
        const subs = [...new Set(db.filter(i => i.category === cat && i.status === '庫存').map(i => i.subCat))];
        subS.innerHTML = '<option value="">-----</option>' + subs.map(s => `<option value="${s}">${s}</option>`).join('');
        subS.disabled = (subs.length === 0);
    }

    function getRecommended() {
        const cat = document.getElementById('pick-cat').value;
        const sub = document.getElementById('pick-sub').value;
        const area = document.getElementById('recommend-area');
        let items = db.filter(i => i.category === cat && i.subCat === sub && i.status === '庫存');
        items.sort((a, b) => (a.expiry || '9999').localeCompare(b.expiry || '9999'));
        const top3 = items.slice(0, 3);
        const labelColors = ['#ff4d4d', '#ffa64d', '#ffdb4d'];
        area.innerHTML = top3.length ? top3.map((i, idx) => `
            <div style="border: 2px solid #000; margin: 25px 0; padding: 18px; position: relative; background: #fff; box-shadow: 6px 6px 0px #eee;">
                <div class="mono" style="position: absolute; top: -12px; left: 12px; background: ${labelColors[idx] || '#ccc'}; color: #000; font-size: 11px; padding: 3px 10px; font-weight: 900; border: 1px solid #000;">PICK_0${idx+1}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <span class="mono" style="font-size: 10px; border: 1px solid #ccc; padding: 1px 4px; color: #666; background: #f4f4f4;">${i.subCat}</span>
                        <span class="mono" style="font-size: 15px; font-weight:900; margin-left: 8px;">${i.name}</span>
                        <div class="mono" style="font-size: 9px; color: #aaa; margin-top: 5px;">> EXP: ${i.expiry || '--'}</div>
                    </div>
                    <button onclick="quickUse(${i.id})" class="btn-sm" style="background:#000; color:#fff; padding: 8px 16px;">OPEN</button>
                </div>
            </div>`).join('') : `<div class="mono" style="padding:30px; text-align:center; color:#aaa; border:1px dashed #aaa;">[ DATABASE_QUERY_EMPTY ]</div>`;
    }

    function quickUse(id) { useItem(id); getRecommended(); }
    function saveCfg() { cfg.cats = document.getElementById('cfg-cats').value; save(); refresh(); }
    function exportDB() {
        try {
            const dataStr = JSON.stringify({db, cfg});
            const base64 = btoa(encodeURIComponent(dataStr).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
            document.getElementById('io-box').value = base64;
            navigator.clipboard.writeText(base64).then(() => alert("SYSTEM_BACKUP: SUCCESS"));
        } catch(e) { alert("EXPORT_ERROR"); }
    }
    function importDB() { const raw = document.getElementById('io-box').value; if(raw && confirm("OVERWRITE?")) { const p = JSON.parse(decodeURIComponent(atob(raw).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); db=p.db; cfg=p.cfg; save(); refresh(); } }

    window.onload = () => { setupDateAutoFormat('in-buy'); setupDateAutoFormat('in-exp'); refresh(); };
</script>
</body>
</html>
