<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETAIL_PRO_V5.2</title>
    <style>
        :root { --sys-bg: #ffffff; --sys-font: "Courier New", monospace; }
        * { box-sizing: border-box; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        .mono { font-family: var(--sys-font); font-weight: bold; }
        body { background: var(--sys-bg); margin: 0; padding-bottom: 80px; color: #000; }
        
        .page { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .page.active { display: block !important; }
        
        /* 表單佈局 */
        .form-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .flex-1 { flex: 1; }
        .flex-4 { flex: 4; }
        .flex-6 { flex: 6; }
        
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #666; }
        
        input, select, textarea { 
            width: 100%; border: 2px solid #000; padding: 10px 8px; font-size: 15px; outline: none; border-radius: 0; 
            background: #fff; height: 45px; appearance: none; -webkit-appearance: none;
        }
        input:focus { background: #f0f7ff; border-color: #0044cc; }

        /* 導覽列 */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; height: 65px; z-index: 999; }
        .nav-btn { flex: 1; color: #666; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: #fff; border-top: 4px solid #00ff00; background: #111; }
        
        .btn { background: #000; color: #fff; border: none; padding: 15px; font-size: 14px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-sm { padding: 6px 10px; font-size: 11px; border: 1.5px solid #000; font-weight: bold; background: #fff; cursor: pointer; }

        /* 僅展示針對 VAULT 頁面美化的 CSS 代碼塊 */
.item-card { 
    border-bottom: 1px solid #000; 
    padding: 16px 0; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

/* 狀態標籤美化 */
.badge {
    font-size: 10px;
    padding: 2px 8px;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 6px;
    border: 1px solid #000;
}
.badge-stock { background: #000; color: #fff; }     /* 庫存：穩重 */
.badge-using { background: #00ff00; color: #000; }  /* 使用中：顯眼 */

/* 中性資訊區 (日期) */
.info-date {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    font-family: var(--sys-font);
}
.exp-warning { color: #d32f2f; font-weight: bold; } /* 快過期警告 */

.item-name {
    font-size: 17px;
    font-weight: bold;
    display: block;
}

        #entry-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

<div id="page-search" class="page active">
    <h2 class="mono">01_SEARCH</h2>

    <div style="background:#fff; border:1px solid #000; padding:15px; margin-bottom:20px; position:relative;">
        <div style="font-family: 'Impact', 'Arial Narrow Bold', sans-serif; font-size: 13px; background: #000; color: #fff; display: inline-block; padding: 2px 10px; letter-spacing: 2px; margin-bottom: 15px;">
            DATABASE_QUERY
        </div>

        <div style="width: 100%;">
            <input type="text" id="check-input" placeholder="INPUT_KEYWORDS..." oninput="doCheck()" 
                   style="width: 100%; border: 1px solid #000; height: 40px; padding: 0 12px; font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: 900; box-sizing: border-box; border-radius: 0;">
        </div>
        
        <div id="check-result" style="font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 900; margin-top: 8px; min-height: 18px;"></div>
    </div>

    <div style="background:#fff; border:1px solid #000; padding:15px; margin-bottom:15px; position:relative;">
        <div style="font-family: 'Impact', 'Arial Narrow Bold', sans-serif; font-size: 13px; background: #000; color: #fff; display: inline-block; padding: 2px 10px; letter-spacing: 2px; margin-bottom: 15px;">
            AUTO_RECOMMEND_V2
        </div>

        <div style="display:flex; gap:5px; margin-bottom: 10px;">
            <select id="pick-cat" onchange="updatePickSub()" 
                    style="flex:1; border: 1px solid #000; border-radius:0; height:40px; background:#fff; font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: 900; padding: 0 10px; appearance: none; -webkit-appearance: none;"></select>
            <select id="pick-sub" onchange="getRecommended()" disabled 
                    style="flex:1; border: 1px solid #000; border-radius:0; height:40px; background:#fff; font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: 900; padding: 0 10px; appearance: none; -webkit-appearance: none;">
                <option value="">--項目--</option>
            </select>
        </div>
        
        <div id="recommend-area"></div>
    </div>
</div>




<div id="page-vault" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 class="mono" style="margin:0;">02_VAULT</h2>
        <button class="btn-sm mono" style="background:#000; color:#fff;" onclick="openEntry()">+ ADD_ITEM</button>
    </div>
    <div id="vault-list"></div>
</div>

<div id="page-sys" class="page">
    <h2 class="mono">03_SYSTEM</h2>
    
    <div style="margin-bottom:20px;">
        <label class="mono" style="font-size:10px;">定義大類別 (用逗號隔開)</label>
        <input type="text" id="cfg-cats" onchange="saveCfg()">
    </div>

    <div style="border:2px solid #000; padding:15px; background:#f9f9f9;">
        <label class="mono" style="font-size:10px;">💾 DATA_BACKUP / RESTORE</label>
        <textarea id="io-box" style="width:100%; height:80px; font-size:10px; margin-top:10px; border:1px solid #000; padding:10px; font-family:monospace;" placeholder="備份代碼會顯示在此..."></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn-sm" style="flex:1; background:#000; color:#fff;" onclick="exportDB()">匯出備份</button>
            <button class="btn-sm" style="flex:1;" onclick="importDB()">匯入還原</button>
        </div>
        <div style="font-size:10px; color:red; margin-top:5px;">＊更換手機前請務必「匯出」並自行保存這段代碼。</div>
    </div>

    <div id="archive-list" style="font-size:12px; color:#999; border-top:1px solid #eee; padding-top:10px; margin-top:20px;"></div>
</div>

<div id="entry-overlay">
    <h2 class="mono" id="form-title">ENTRY_LOG</h2>
    <input type="hidden" id="edit-id">
    
    <div class="form-row">
        <div class="form-group flex-1"><label>CAT</label><select id="in-cat"></select></div>
        <div class="form-group flex-1"><label>SUB_CAT</label><input type="text" id="in-sub"></div>
        <div class="form-group flex-1">
            <label>STATUS</label>
            <select id="in-status"><option value="庫存">庫存</option><option value="使用中">使用中</option><option value="已用完">已用完</option></select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group flex-6"><label>PRODUCT_NAME</label><input type="text" id="in-name"></div>
        <div class="form-group flex-4"><label>TAGS</label><input type="text" id="in-tag"></div>
    </div>

    <div class="form-row">
        <div class="form-group flex-1"><label>BUY_DATE</label><input type="date" id="in-buy"></div>
        <div class="form-group flex-1"><label>EXPIRY</label><input type="date" id="in-exp"></div>
    </div>

    <div class="form-row">
        <div class="form-group flex-1"><label>BARCODE</label><input type="text" id="in-bar"></div>
        <div class="form-group flex-1"><label>BATCH_QTY (包數)</label><input type="number" id="in-qty" value="1" min="1"></div>
    </div>

    <div style="display:flex; gap:10px; margin-top:30px;">
        <button class="btn" style="background:#eee; color:#000; flex:1;" onclick="closeEntry()">CANCEL</button>
        <button class="btn" style="flex:2;" onclick="saveEntry()">CONFIRM_SAVE</button>
    </div>
</div>

<nav class="nav mono">
    <div class="nav-btn active" onclick="tab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="tab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="tab('page-sys', this)">SYSTEM</div>
</nav>

<script>
    // 資料初始化 (升級至 V52 避免與舊版衝突)
    let db = JSON.parse(localStorage.getItem('retail_v52_db') || '[]');
    let cfg = JSON.parse(localStorage.getItem('retail_v52_cfg') || '{"cats":"護膚產品,頭髮產品,身體保養,家用清潔"}');

    function save() { 
        localStorage.setItem('retail_v52_db', JSON.stringify(db)); 
        localStorage.setItem('retail_v52_cfg', JSON.stringify(cfg)); 
    }

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active'); 
        refresh(); 
    }

    // --- 表單邏輯 ---
    function openEntry() {
        document.getElementById('entry-overlay').style.display = 'block';
        document.getElementById('form-title').innerText = 'NEW_ENTRY';
        document.getElementById('edit-id').value = '';
        document.getElementById('in-cat').innerHTML = cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        document.getElementById('in-buy').value = new Date().toISOString().split('T')[0];
        document.getElementById('in-qty').value = 1; 
        document.getElementById('in-qty').disabled = false;
        ['in-sub','in-name','in-tag','in-exp','in-bar'].forEach(id => document.getElementById(id).value = '');
    }

    function editItem(id) {
        const i = db.find(x => x.id === id);
        openEntry();
        document.getElementById('form-title').innerText = 'EDIT_ITEM';
        document.getElementById('edit-id').value = i.id;
        document.getElementById('in-cat').value = i.category;
        document.getElementById('in-sub').value = i.subCat;
        document.getElementById('in-name').value = i.name;
        document.getElementById('in-tag').value = i.tags || '';
        document.getElementById('in-buy').value = i.buyDate;
        document.getElementById('in-exp').value = i.expiry || '';
        document.getElementById('in-bar').value = i.barcode || '';
        document.getElementById('in-status').value = i.status;
        document.getElementById('in-qty').disabled = true;
    }

    function saveEntry() {
        const eid = document.getElementById('edit-id').value;
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const name = document.getElementById('in-name').value;
        if(!name) return alert("請輸入品名");

        const data = {
            category: document.getElementById('in-cat').value,
            subCat: document.getElementById('in-sub').value || "未分類",
            name: name,
            tags: document.getElementById('in-tag').value,
            buyDate: document.getElementById('in-buy').value,
            expiry: document.getElementById('in-exp').value,
            barcode: document.getElementById('in-bar').value,
            status: document.getElementById('in-status').value
        };

        if(eid) {
            const idx = db.findIndex(x => x.id == eid);
            db[idx] = {...db[idx], ...data};
        } else {
            for(let i=0; i<qty; i++) {
                db.push({ ...data, id: Date.now() + i });
            }
        }
        save(); closeEntry(); refresh();
    }

    function closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; }

    // --- 備份功能補回 ---
    function exportDB() {
        const data = { db: db, cfg: cfg };
        document.getElementById('io-box').value = JSON.stringify(data);
        document.getElementById('io-box').select();
        document.execCommand('copy');
        alert("代碼已產生並複製到剪貼簿！");
    }

    function importDB() {
        const raw = document.getElementById('io-box').value;
        if(!raw) return alert("請先在框內貼上備份代碼");
        try {
            const parsed = JSON.parse(raw);
            if(confirm("確定要覆蓋現有資料嗎？此動作無法復原。")) {
                db = parsed.db;
                cfg = parsed.cfg;
                save();
                refresh();
                alert("還原成功！");
            }
        } catch(e) {
            alert("代碼格式不正確，請重新確認。");
        }
    }

    // --- 搜尋與推薦 ---
    function updatePickSub() {
        const cat = document.getElementById('pick-cat').value;
        const subS = document.getElementById('pick-sub');
        const subs = [...new Set(db.filter(i => i.category === cat && i.status === '庫存').map(i => i.subCat))];
        subS.innerHTML = '<option value="">--項目--</option>' + subs.map(s => `<option value="${s}">${s}</option>`).join('');
        subS.disabled = (subs.length === 0);
    }

function getRecommended() {
    const cat = document.getElementById('pick-cat').value;
    const sub = document.getElementById('pick-sub').value;
    const area = document.getElementById('recommend-area');
    const today = new Date();

    let items = db.filter(i => i.category === cat && i.subCat === sub && i.status === '庫存');

    items.sort((a, b) => {
        const dateA = a.expiry ? new Date(a.expiry) : new Date('9999-12-31');
        const dateB = b.expiry ? new Date(b.expiry) : new Date('9999-12-31');
        return dateA - dateB;
    });

    const top3 = items.slice(0, 3);
    const labelColors = ['#ff0000', '#ea7709', '#ffec00'];
    const textColors = ['#fff', '#fff', '#fff'];

    if (top3.length > 0) {
        area.innerHTML = top3.map((i, index) => {
            const daysLeft = i.expiry ? Math.ceil((new Date(i.expiry) - today) / (1000 * 60 * 60 * 24)) : null;
            const expLabel = daysLeft !== null ? (daysLeft <= 0 ? "EXPIRED" : `${daysLeft}D_LEFT`) : "NO_EXPIRY";
            const isCritical = daysLeft !== null && daysLeft <= 30;

            return `
                <div style="
                    border: 1.5px solid #000; 
                    margin-top: 25px; 
                    background: #f4f4f4; 
                    padding: 18px 15px 15px 15px; 
                    position: relative;
                    box-shadow: 4px 4px 0px #000;
                    margin-right: 5px;
                ">
                    <div class="mono" style="
                        position: absolute; 
                        top: -12px; 
                        left: 10px; 
                        background: ${labelColors[index]}; 
                        color: ${textColors[index]}; 
                        font-size: 11px; 
                        font-weight: 900;
                        padding: 3px 12px;
                        border: 1.5px solid #000;
                        z-index: 10;
                    ">
                        PICK_0${index + 1}
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="flex: 1;">
                            <div style="font-family: 'Futura', 'Trebuchet MS', Arial, sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 4px; letter-spacing: -0.5px; color: #000;">
                                ${i.name}
                            </div>
                            <div class="mono" style="font-size: 10px; color: ${isCritical ? '#ff0000' : '#666'};">
                                EXP: ${i.expiry || '----/--/--'} [${expLabel}]
                            </div>
                        </div>
                        
                        <button onclick="quickUse(${i.id})" 
                                class="mono"
                                style="
                                    border: none;
                                    background: #000; 
                                    color: #fff;
                                    padding: 8px 16px; 
                                    font-size: 11px; 
                                    font-weight: 900; 
                                    cursor: pointer; 
                                    letter-spacing: 1px;
                                    transition: opacity 0.2s;
                                ">
                            OPEN_NOW
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    } else {
        area.innerHTML = `<div class="mono" style="text-align:center; padding: 20px; color: #aaa; border: 1.5px solid #000; margin-top: 20px; background:#f4f4f4; box-shadow: 4px 4px 0px #000; margin-right:5px;">EMPTY_STOCK</div>`;
    }
}


    function quickUse(id) {
        const i = db.find(x => x.id === id);
        i.status = '使用中';
        save(); refresh(); getRecommended();
    }

    function doCheck() {
        const q = document.getElementById('check-input').value.toLowerCase();
        const res = document.getElementById('check-result');
        if(!q) { res.innerHTML = ""; return; }
        const count = db.filter(i => i.status !== '已用完' && (i.name.toLowerCase().includes(q) || (i.tags && i.tags.toLowerCase().includes(q)))).length;
        res.innerHTML = count > 0 ? `⚠️ 庫存：${count}` : `✅ 無庫存`;
    }




    function renderVault() {
    const list = document.getElementById('vault-list');
    // 假設 db 是你的資料庫，這裡過濾出在席庫存
    const activeItems = db.filter(i => i.status === '庫存');

    list.innerHTML = activeItems.map(i => `
        <div style="
            border: 1px solid #000; 
            margin-bottom: 20px; 
            background: #fff; 
            padding: 15px; 
            position: relative;
            box-shadow: 4px 4px 0px #000; /* 延續硬陰影 */
            margin-right: 5px;
        ">
            <div class="mono" style="
                position: absolute; 
                top: -10px; 
                left: 10px; 
                background: #000; 
                color: #fff; 
                font-size: 10px; 
                font-weight: 900;
                padding: 2px 8px;
                border: 1px solid #000;
            ">
                ${i.category} / ${i.subCat}
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                <div style="flex: 1;">
                    <div style="font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 16px; color: #000; letter-spacing: -0.5px;">
                        ${i.name}
                    </div>
                    <div style="font-family: 'Courier New', Courier, monospace; font-size: 10px; color: #666; margin-top: 4px;">
                        ID: ${String(i.id).padStart(4, '0')} | EXP: ${i.expiry || '----/--/--'}
                    </div>
                </div>

                <button onclick="useItem(${i.id})" 
                        style="
                            border: none;
                            background: #000; 
                            color: #fff;
                            padding: 6px 12px; 
                            font-size: 10px; 
                            font-family: 'Impact', sans-serif;
                            font-weight: 400; 
                            cursor: pointer; 
                            letter-spacing: 1px;
                        ">
                    MARK_USED
                </button>
            </div>
        </div>
    `).join('');
}


    function refresh() {
        document.getElementById('cfg-cats').value = cfg.cats;
        document.getElementById('pick-cat').innerHTML = '<option value="">--大類--</option>' + cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        renderVault();
        const archived = db.filter(i => i.status === '已用完');
        document.getElementById('archive-list').innerHTML = `歸檔項目 (${archived.length})<br>` + archived.map(i => `• ${i.name}`).join('<br>');
    }

    function saveCfg() { cfg.cats = document.getElementById('cfg-cats').value; save(); refresh(); }

    window.onload = refresh;
</script>
</body>
</html>
