<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETAIL_PRO_V5.1</title>
    <style>
        :root { --sys-bg: #ffffff; --sys-font: "Courier New", monospace; }
        * { box-sizing: border-box; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        .mono { font-family: var(--sys-font); font-weight: bold; }
        body { background: var(--sys-bg); margin: 0; padding-bottom: 80px; color: #000; }
        
        .page { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .page.active { display: block !important; }
        
        /* 表單佈局 */
        .form-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .flex-1 { flex: 1; }
        .flex-4 { flex: 4; }
        .flex-6 { flex: 6; }
        
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #666; }
        
        input, select { 
            width: 100%; border: 2px solid #000; padding: 10px 8px; font-size: 15px; outline: none; border-radius: 0; 
            background: #fff; height: 45px; appearance: none; -webkit-appearance: none;
        }
        input:focus { background: #f0f7ff; border-color: #0044cc; }

        /* 導覽列 */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; height: 65px; z-index: 999; }
        .nav-btn { flex: 1; color: #666; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: #fff; border-top: 4px solid #00ff00; background: #111; }
        
        .btn { background: #000; color: #fff; border: none; padding: 15px; font-size: 14px; width: 100%; font-weight: bold; }
        .btn-sm { padding: 6px 10px; font-size: 11px; border: 1.5px solid #000; font-weight: bold; background: #fff; }

        .item-card { border-bottom: 2px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .tag-pill { background: #eee; font-size: 10px; padding: 1px 5px; border: 1px solid #000; margin-right: 3px; }

        #entry-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

<div id="page-search" class="page active">
    <h2 class="mono">01_SEARCH</h2>
    <div style="border:2px solid #000; padding:15px; margin-bottom:15px;">
        <input type="text" id="check-input" placeholder="查庫存或標籤..." oninput="doCheck()">
        <div id="check-result" style="margin-top:5px; font-weight:bold;"></div>
    </div>
    <div style="background:#f9f9f9; border:2px solid #000; padding:15px;">
        <label class="mono" style="font-size:10px;">🎯 AUTO_RECOMMEND</label>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <select id="pick-cat" onchange="updatePickSub()" style="flex:1;"></select>
            <select id="pick-sub" onchange="getRecommended()" disabled style="flex:1;"><option value="">--項目--</option></select>
        </div>
        <div id="recommend-area"></div>
    </div>
</div>

<div id="page-vault" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 class="mono" style="margin:0;">02_VAULT</h2>
        <button class="btn-sm mono" style="background:#000; color:#fff;" onclick="openEntry()">+ ADD_ITEM</button>
    </div>
    <div id="vault-list"></div>
</div>

<div id="page-sys" class="page">
    <h2 class="mono">03_SYSTEM</h2>
    <div style="margin-bottom:20px;">
        <label class="mono" style="font-size:10px;">分類定義(逗號隔開)</label>
        <input type="text" id="cfg-cats" onchange="saveCfg()">
    </div>
    <div id="archive-list" style="font-size:12px; color:#999; border-top:1px solid #eee; padding-top:10px;"></div>
</div>

<div id="entry-overlay">
    <h2 class="mono" id="form-title">ENTRY_LOG</h2>
    <input type="hidden" id="edit-id">
    
    <div class="form-row">
        <div class="form-group flex-1"><label>CAT</label><select id="in-cat"></select></div>
        <div class="form-group flex-1"><label>SUB_CAT</label><input type="text" id="in-sub"></div>
        <div class="form-group flex-1">
            <label>STATUS</label>
            <select id="in-status"><option value="庫存">庫存</option><option value="使用中">使用中</option><option value="已用完">已用完</option></select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group flex-6"><label>PRODUCT_NAME</label><input type="text" id="in-name"></div>
        <div class="form-group flex-4"><label>TAGS</label><input type="text" id="in-tag"></div>
    </div>

    <div class="form-row">
        <div class="form-group flex-1"><label>BUY_DATE</label><input type="date" id="in-buy"></div>
        <div class="form-group flex-1"><label>EXPIRY</label><input type="date" id="in-exp"></div>
    </div>

    <div class="form-row">
        <div class="form-group flex-1"><label>BARCODE</label><input type="text" id="in-bar"></div>
        <div class="form-group flex-1"><label>BATCH_QTY (包數)</label><input type="number" id="in-qty" value="1" min="1"></div>
    </div>

    <div style="display:flex; gap:10px; margin-top:30px;">
        <button class="btn" style="background:#eee; color:#000; flex:1;" onclick="closeEntry()">CANCEL</button>
        <button class="btn" style="flex:2;" onclick="saveEntry()">CONFIRM_SAVE</button>
    </div>
</div>

<nav class="nav mono">
    <div class="nav-btn active" onclick="tab('page-search', this)">SEARCH</div>
    <div class="nav-btn" onclick="tab('page-vault', this)">VAULT</div>
    <div class="nav-btn" onclick="tab('page-sys', this)">SYSTEM</div>
</nav>

<script>
    // 資料初始化
    let db = JSON.parse(localStorage.getItem('retail_v51_db') || '[]');
    let cfg = JSON.parse(localStorage.getItem('retail_v51_cfg') || '{"cats":"保養品,家用品,食品"}');

    function save() { 
        localStorage.setItem('retail_v51_db', JSON.stringify(db)); 
        localStorage.setItem('retail_v51_cfg', JSON.stringify(cfg)); 
    }

    // 頁面切換核心函式
    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active'); 
        refresh(); 
    }

    // --- 表單邏輯 ---
    function openEntry() {
        document.getElementById('entry-overlay').style.display = 'block';
        document.getElementById('form-title').innerText = 'NEW_ENTRY';
        document.getElementById('edit-id').value = '';
        document.getElementById('in-cat').innerHTML = cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        document.getElementById('in-buy').value = new Date().toISOString().split('T')[0];
        document.getElementById('in-qty').value = 1; 
        document.getElementById('in-qty').disabled = false;
        ['in-sub','in-name','in-tag','in-exp','in-bar'].forEach(id => document.getElementById(id).value = '');
    }

    function editItem(id) {
        const i = db.find(x => x.id === id);
        openEntry();
        document.getElementById('form-title').innerText = 'EDIT_ITEM';
        document.getElementById('edit-id').value = i.id;
        document.getElementById('in-cat').value = i.category;
        document.getElementById('in-sub').value = i.subCat;
        document.getElementById('in-name').value = i.name;
        document.getElementById('in-tag').value = i.tags || '';
        document.getElementById('in-buy').value = i.buyDate;
        document.getElementById('in-exp').value = i.expiry || '';
        document.getElementById('in-bar').value = i.barcode || '';
        document.getElementById('in-status').value = i.status;
        document.getElementById('in-qty').disabled = true;
    }

    function saveEntry() {
        const eid = document.getElementById('edit-id').value;
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const name = document.getElementById('in-name').value;
        if(!name) return alert("請輸入品名");

        const data = {
            category: document.getElementById('in-cat').value,
            subCat: document.getElementById('in-sub').value || "未分類",
            name: name,
            tags: document.getElementById('in-tag').value,
            buyDate: document.getElementById('in-buy').value,
            expiry: document.getElementById('in-exp').value,
            barcode: document.getElementById('in-bar').value,
            status: document.getElementById('in-status').value
        };

        if(eid) {
            const idx = db.findIndex(x => x.id == eid);
            db[idx] = {...db[idx], ...data};
        } else {
            for(let i=0; i<qty; i++) {
                db.push({ ...data, id: Date.now() + i });
            }
        }
        save(); closeEntry(); refresh();
    }

    function closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; }

    // --- 搜尋與推薦 ---
    function updatePickSub() {
        const cat = document.getElementById('pick-cat').value;
        const subS = document.getElementById('pick-sub');
        const subs = [...new Set(db.filter(i => i.category === cat && i.status === '庫存').map(i => i.subCat))];
        subS.innerHTML = '<option value="">--項目--</option>' + subs.map(s => `<option value="${s}">${s}</option>`).join('');
        subS.disabled = (subs.length === 0);
    }

    function getRecommended() {
        const cat = document.getElementById('pick-cat').value;
        const sub = document.getElementById('pick-sub').value;
        const area = document.getElementById('recommend-area');
        let items = db.filter(i => i.category === cat && i.subCat === sub && i.status === '庫存');
        items.sort((a,b) => (a.expiry || '9999') > (b.expiry || '9999') ? 1 : -1);
        if(items.length) {
            const i = items[0];
            area.innerHTML = `<div style="border:4px solid #000; padding:15px; margin-top:15px; background:#fff;"><b>${i.name}</b><br><small>${i.tags}</small><button class="btn" style="margin-top:10px; background:blue;" onclick="quickUse(${i.id})">開啟使用</button></div>`;
        } else { area.innerHTML = ""; }
    }

    function quickUse(id) {
        const i = db.find(x => x.id === id);
        i.status = '使用中';
        save(); refresh(); getRecommended();
    }

    function doCheck() {
        const q = document.getElementById('check-input').value.toLowerCase();
        const res = document.getElementById('check-result');
        if(!q) { res.innerHTML = ""; return; }
        const count = db.filter(i => i.status !== '已用完' && (i.name.toLowerCase().includes(q) || (i.tags && i.tags.toLowerCase().includes(q)))).length;
        res.innerHTML = count > 0 ? `⚠️ 庫存：${count}` : `✅ 無庫存`;
    }

    // --- 系統渲染 ---
    function renderVault() {
        const list = document.getElementById('vault-list');
        list.innerHTML = db.filter(i => i.status !== '已_用完').map(i => `
            <div class="item-card">
                <div><span class="mono" style="font-size:9px; border:1px solid #000; padding:1px 4px;">${i.status}</span><br><b>${i.name}</b></div>
                <button class="btn-sm mono" onclick="editItem(${i.id})">EDIT</button>
            </div>`).join('');
    }

    function refresh() {
        document.getElementById('cfg-cats').value = cfg.cats;
        document.getElementById('pick-cat').innerHTML = '<option value="">--大類--</option>' + cfg.cats.split(',').map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
        renderVault();
        document.getElementById('archive-list').innerHTML = "歸檔項目：" + db.filter(i => i.status === '已用完').length;
    }

    function saveCfg() { cfg.cats = document.getElementById('cfg-cats').value; save(); refresh(); }

    window.onload = refresh;
</script>
</body>
</html>
